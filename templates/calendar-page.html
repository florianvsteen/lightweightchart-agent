<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — The Inner Flows</title>
<link rel="stylesheet" href="/static/dashboard.css">
<style>
html, body { height: 100%; overflow: hidden; }

#app { height: 100vh; overflow: hidden; }

#main-content {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Page header ── */
#cal-page-header {
  padding: 20px 32px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 16px;
  flex-wrap: wrap;
}
#cal-page-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2.4rem;
  color: var(--accent);
  letter-spacing: -0.01em;
  line-height: 1;
}
#cal-page-sub {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-top: 4px;
}
#cal-tz-badge {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--accent);
  border: 1px solid rgba(90,240,196,0.35);
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  background: rgba(90,240,196,0.04);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
}
#cal-tz-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.4s ease-in-out infinite;
  flex-shrink: 0;
}

/* ── Filter bar ── */
#cal-filter-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 32px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.filter-group { display: flex; align-items: center; gap: 5px; }
.filter-group-label {
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-right: 2px;
  white-space: nowrap;
}
.filter-sep { width: 1px; height: 18px; background: var(--border2); flex-shrink: 0; }

.date-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--muted);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 4px 12px;
  transition: all 0.15s;
  white-space: nowrap;
}
.date-btn:hover { border-color: #888; color: #ccc; }
.date-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(90,240,196,0.08); }

#custom-date-input {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  padding: 4px 10px;
  display: none;
  outline: none;
}
#custom-date-input:focus { border-color: var(--accent); }
#custom-date-input.visible { display: block; }

.pill-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--muted);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 3px 9px;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill-btn:hover { border-color: #666; color: #bbb; }
.pill-btn.active-cur { border-color: var(--accent); color: var(--accent); background: rgba(90,240,196,0.07); }
.pill-btn.active-imp-high   { border-color: rgba(240,80,80,0.6);  color: #f05050; background: rgba(240,80,80,0.07); }
.pill-btn.active-imp-medium { border-color: rgba(240,160,40,0.6); color: #f0a028; background: rgba(240,160,40,0.07); }
.pill-btn.active-imp-low    { border-color: rgba(140,140,140,0.5);color: #aaa;    background: rgba(140,140,140,0.05); }

/* ══════════════════════════════════════════════════════════════
   TIMELINE — fills remaining vertical space
   ══════════════════════════════════════════════════════════════ */

#timeline-outer {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Ruler — fixed height, clips overflow, syncs scroll via JS */
#timeline-ruler-wrap {
  flex-shrink: 0;
  height: 34px;
  overflow: hidden;
  position: relative;
  border-bottom: 1px solid var(--border2);
  background: rgba(10,10,12,0.95);
  z-index: 10;
}
#timeline-ruler {
  height: 100%;
  position: relative;
  /* width set by JS */
}

/* Day separator labels on ruler */
.ruler-day-label {
  position: absolute;
  bottom: 4px;
  font-family: 'Syne', sans-serif;
  font-size: 0.6rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  padding: 1px 6px;
  background: rgba(90,240,196,0.08);
  border-radius: 3px;
  border: 1px solid rgba(90,240,196,0.15);
}

.ruler-tick {
  position: absolute;
  top: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  transform: translateX(-50%);
}
.ruler-tick-line { width: 1px; }
.ruler-tick-label {
  font-size: 0.52rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  white-space: nowrap;
  font-family: 'Space Mono', monospace;
}

/* NOW marker on ruler */
#ruler-now-marker {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--accent);
  opacity: 0.8;
  pointer-events: none;
  z-index: 5;
}
#ruler-now-label {
  position: absolute;
  top: 3px;
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem;
  font-weight: 700;
  color: var(--bg);
  background: var(--accent);
  padding: 1px 5px;
  border-radius: 3px;
  transform: translateX(-50%);
  white-space: nowrap;
  letter-spacing: 0.1em;
  z-index: 6;
}

/* Scrollable canvas area */
#timeline-scroll {
  flex: 1;
  min-height: 0;
  overflow-x: auto;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
  cursor: grab;
  user-select: none;
  position: relative;
}
#timeline-scroll:active { cursor: grabbing; }
#timeline-scroll::-webkit-scrollbar { height: 5px; width: 4px; }
#timeline-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* The actual wide canvas */
#timeline-canvas {
  position: relative;
  min-height: 100%;
}

/* Vertical grid lines */
.canvas-vline {
  position: absolute;
  top: 0; bottom: 0;
  pointer-events: none;
}
.canvas-vline.hour  { width: 1px; background: var(--border); opacity: 0.6; }
.canvas-vline.major { width: 1px; background: var(--border2); opacity: 1; }
.canvas-vline.day   { width: 2px; background: rgba(90,240,196,0.12); }

/* Day label band on canvas */
.canvas-day-band {
  position: absolute;
  top: 0;
  height: 100%;
  border-left: 2px solid rgba(90,240,196,0.15);
  pointer-events: none;
}
.canvas-day-label {
  position: absolute;
  top: 8px;
  left: 6px;
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem;
  font-weight: 800;
  color: rgba(90,240,196,0.3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
}

/* NOW line on canvas */
#canvas-now-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--accent);
  opacity: 0.35;
  pointer-events: none;
  z-index: 3;
}

/* Time column — groups cards at same time */
.time-col {
  position: absolute;
  top: 28px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transform: translateX(-50%);
  z-index: 2;
}

/* Dot connecting ruler to first card */
.time-col-dot {
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--border2);
  border: 1px solid var(--border2);
}

/* ── Event card ── */
.cal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
  animation: fadeUp 0.18s ease both;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.cal-card:hover {
  border-color: var(--border2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.cal-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: var(--radius) 0 0 var(--radius);
}
.cal-card.impact-High::before   { background: #f05050; }
.cal-card.impact-Medium::before { background: #f0a028; }
.cal-card.impact-Low::before    { background: #3a3a50; }

.cal-card-top {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.cal-card-time {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}
.cal-card-cur {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
}
.cal-card-cur.EUR { background: rgba(90,200,80,0.12);  color: #50c840; border: 1px solid rgba(90,200,80,0.3); }
.cal-card-cur.GBP { background: rgba(240,50,80,0.12);  color: #f03050; border: 1px solid rgba(240,50,80,0.3); }
.cal-card-cur.USD { background: rgba(90,90,240,0.12);  color: #6060f0; border: 1px solid rgba(90,90,240,0.3); }
.cal-card-cur.JPY { background: rgba(240,180,40,0.12); color: #f0b428; border: 1px solid rgba(240,180,40,0.3); }
.cal-card-cur.AUD { background: rgba(240,90,40,0.12);  color: #f05a28; border: 1px solid rgba(240,90,40,0.3); }
.cal-card-cur.CAD { background: rgba(220,40,40,0.12);  color: #dc3030; border: 1px solid rgba(220,40,40,0.3); }
.cal-card-cur.CHF { background: rgba(200,40,240,0.10); color: #c828f0; border: 1px solid rgba(200,40,240,0.25); }
.cal-card-cur.CNY { background: rgba(240,200,40,0.10); color: #f0c828; border: 1px solid rgba(240,200,40,0.25); }

.cal-card-impact {
  font-size: 0.5rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 1px 6px;
  border-radius: 20px;
  border: 1px solid;
  white-space: nowrap;
}
.cal-card-impact.High   { border-color: rgba(240,80,80,0.5);  color: #f05050; background: rgba(240,80,80,0.07); }
.cal-card-impact.Medium { border-color: rgba(240,160,40,0.5); color: #f0a028; background: rgba(240,160,40,0.07); }
.cal-card-impact.Low    { border-color: rgba(100,100,120,0.4);color: #666680; }

.cal-card-countdown {
  margin-left: auto;
  font-family: 'Space Mono', monospace;
  font-size: 0.54rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 1px 7px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
  border: 1px solid rgba(90,240,196,0.3);
  color: var(--accent);
  background: rgba(90,240,196,0.05);
}
.cal-card-countdown.past { border-color: var(--border2); color: var(--muted); background: none; }
.cal-card-countdown.soon { border-color: rgba(240,160,40,0.5); color: #f0a028; background: rgba(240,160,40,0.06); animation: pulse 1.2s ease-in-out infinite; }

.cal-card-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  color: #fff;
  letter-spacing: 0.02em;
  line-height: 1.2;
}
.cal-card-ai {
  background: rgba(90,240,196,0.03);
  border: 1px solid rgba(90,240,196,0.1);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}
.cal-card-ai-label {
  font-size: 0.5rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.cal-card-ai-text {
  font-size: 0.62rem;
  color: var(--text);
  line-height: 1.6;
  opacity: 0.85;
}
.cal-card-data { display: flex; gap: 16px; flex-wrap: wrap; }
.cal-card-data-item { display: flex; flex-direction: column; gap: 1px; }
.cal-card-data-label { font-size: 0.46rem; color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase; }
.cal-card-data-val   { font-size: 0.75rem; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.cal-card-data-val.actual { color: var(--accent); }

/* Loading */
#cal-loading {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; padding: 60px 0;
  font-size: 0.62rem; color: var(--muted); letter-spacing: 0.12em;
  position: absolute; inset: 0;
}
.cal-load-spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
#cal-empty {
  display: none; text-align: center; padding: 60px 0;
  font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em;
  position: absolute; inset: 0; align-items: center; justify-content: center;
}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const PX_PER_HOUR = 200;   // pixels per hour
const CARD_W      = 280;   // card width px
const DAY_HOURS   = 24;
const DAY_PX      = PX_PER_HOUR * DAY_HOURS;
const LEFT_PAD    = 20;    // padding before 00:00

const TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
document.getElementById('tz-name').textContent = TZ;

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let _allEvents  = [];
let _dateMode   = 'week';
let _customDate = '';
let _activeCurs = new Set(['EUR','USD','GBP','JPY']);
let _activeImps = new Set(['High','Medium']);

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
const todayUTC    = () => new Date().toISOString().slice(0,10);
const tomorrowUTC = () => new Date(Date.now()+86400000).toISOString().slice(0,10);

function getTargetDates() {
  if (_dateMode === 'today')    return [todayUTC()];
  if (_dateMode === 'tomorrow') return [tomorrowUTC()];
  if (_dateMode === 'custom')   return [_customDate].filter(Boolean);
  const dates = [];
  for (let i = 0; i < 7; i++)
    dates.push(new Date(Date.now()+i*86400000).toISOString().slice(0,10));
  return dates;
}

function evDateUTC(ev) { return (ev.event_time||'').slice(0,10); }

// Fractional UTC hours for an event
function evHoursUTC(ev) {
  if (!ev.event_time) return 0;
  const d = new Date(ev.event_time);
  return isNaN(d) ? 0 : d.getUTCHours() + d.getUTCMinutes()/60 + d.getUTCSeconds()/3600;
}

// Date index → pixel offset for a given hour within that day
function toX(dateIndex, hours) {
  return LEFT_PAD + dateIndex * DAY_PX + hours * PX_PER_HOUR;
}

function nowHoursUTC() {
  const n = new Date();
  return n.getUTCHours() + n.getUTCMinutes()/60 + n.getUTCSeconds()/3600;
}

function calCountdown(isoUtc) {
  if (!isoUtc) return {label:'—',cls:''};
  const ms   = new Date(isoUtc).getTime();
  if (isNaN(ms)) return {label:'—',cls:''};
  const diff = ms - Date.now();
  const min  = Math.floor(Math.abs(diff)/60000);
  if (diff < 0) {
    if (min < 60) return {label:`${min}m ago`,cls:'past'};
    const h = Math.floor(min/60);
    if (h < 24) return {label:`${h}h ago`,cls:'past'};
    return {label:`${Math.floor(h/24)}d ago`,cls:'past'};
  }
  if (min < 30) return {label:`in ${min}m`,cls:'soon'};
  if (min < 60) return {label:`in ${min}m`,cls:''};
  const h = Math.floor(min/60), m = min%60;
  return {label:`in ${h}h${m>0?' '+m+'m':''}`,cls:''};
}

function fmtTime(isoUtc) {
  if (!isoUtc) return '';
  const d = new Date(isoUtc);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});
}

function fmtDayLabel(dateStr) {
  const today    = todayUTC();
  const tomorrow = tomorrowUTC();
  if (dateStr === today)    return 'Today';
  if (dateStr === tomorrow) return 'Tomorrow';
  return new Date(dateStr+'T12:00:00Z')
    .toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
}

// ══════════════════════════════════════════════════════════════
//  FILTER CONTROLS
// ══════════════════════════════════════════════════════════════
function setDate(mode) {
  _dateMode = mode;
  ['today','tomorrow','week','custom'].forEach(m =>
    document.getElementById('btn-'+m)?.classList.remove('active'));
  document.getElementById('btn-'+mode)?.classList.add('active');
  document.getElementById('custom-date-input').classList.toggle('visible', mode==='custom');
  buildTimeline();
}
function toggleCustomDate() { setDate('custom'); }
function setCustomDate(v)   { _customDate = v; buildTimeline(); }

function toggleCur(btn) {
  const c = btn.dataset.cur;
  if (_activeCurs.has(c)) { _activeCurs.delete(c); btn.classList.remove('active-cur'); }
  else                     { _activeCurs.add(c);    btn.classList.add('active-cur'); }
  buildTimeline();
}
function toggleImp(btn) {
  const imp = btn.dataset.imp;
  const cls = {High:'active-imp-high',Medium:'active-imp-medium',Low:'active-imp-low'}[imp];
  if (_activeImps.has(imp)) { _activeImps.delete(imp); btn.classList.remove(cls); }
  else                       { _activeImps.add(imp);    btn.classList.add(cls); }
  buildTimeline();
}

// ══════════════════════════════════════════════════════════════
//  BUILD TIMELINE
// ══════════════════════════════════════════════════════════════
function buildTimeline() {
  const dates   = getTargetDates();
  const loading = document.getElementById('cal-loading');
  const empty   = document.getElementById('cal-empty');
  const canvas  = document.getElementById('timeline-canvas');
  const ruler   = document.getElementById('timeline-ruler');

  loading.style.display = 'none';

  // Filter events
  const filtered = _allEvents.filter(ev =>
    dates.includes(evDateUTC(ev)) &&
    _activeCurs.has(ev.currency) &&
    _activeImps.has(ev.impact)
  );

  if (!filtered.length) {
    empty.style.display = 'flex';
    canvas.innerHTML = '';
    ruler.innerHTML  = '';
    canvas.style.width = '100%';
    ruler.style.width  = '100%';
    return;
  }
  empty.style.display = 'none';

  // Total canvas width
  const totalW = LEFT_PAD + dates.length * DAY_PX + 60;
  canvas.style.width = totalW + 'px';
  ruler.style.width  = totalW + 'px';

  // ── BUILD RULER ──────────────────────────────────────────────
  ruler.innerHTML = '';

  dates.forEach((date, di) => {
    // Day label
    const dayLabel = document.createElement('div');
    dayLabel.className = 'ruler-day-label';
    dayLabel.textContent = fmtDayLabel(date);
    dayLabel.style.left = (LEFT_PAD + di * DAY_PX + 8) + 'px';
    dayLabel.style.top  = '4px';
    ruler.appendChild(dayLabel);

    // Hour ticks within day
    for (let h = 0; h <= DAY_HOURS; h++) {
      const x = toX(di, h);
      const isMajor = h % 3 === 0;
      if (!isMajor && h % 1 !== 0) continue;
      const tick = document.createElement('div');
      tick.className = 'ruler-tick';
      tick.style.left = x + 'px';
      tick.innerHTML = `
        <div class="ruler-tick-line" style="
          height:${isMajor?10:5}px;
          background:${isMajor?'var(--border2)':'var(--border)'};
          width:1px;
          margin-top:${isMajor?0:5}px;
        "></div>
        ${isMajor && h > 0 ? `<div class="ruler-tick-label">${String(h).padStart(2,'0')}:00</div>` : ''}
      `;
      ruler.appendChild(tick);
    }
  });

  // NOW marker on ruler
  const nowDateIdx = dates.indexOf(todayUTC());
  if (nowDateIdx >= 0) {
    const nowX = toX(nowDateIdx, nowHoursUTC());
    const nm = document.createElement('div');
    nm.id = 'ruler-now-marker';
    nm.style.left = nowX + 'px';
    const nl = document.createElement('div');
    nl.id = 'ruler-now-label';
    nl.style.left = nowX + 'px';
    nl.textContent = 'NOW';
    ruler.appendChild(nm);
    ruler.appendChild(nl);
  }

  // ── BUILD CANVAS ─────────────────────────────────────────────
  canvas.innerHTML = '';

  dates.forEach((date, di) => {
    // Day background band
    const band = document.createElement('div');
    band.className = 'canvas-day-band';
    band.style.left  = toX(di, 0) + 'px';
    band.style.width = DAY_PX + 'px';
    const bandLabel = document.createElement('div');
    bandLabel.className = 'canvas-day-label';
    bandLabel.textContent = fmtDayLabel(date);
    band.appendChild(bandLabel);
    canvas.appendChild(band);

    // Hour grid lines
    for (let h = 0; h <= DAY_HOURS; h++) {
      const line = document.createElement('div');
      const isMajor = h % 3 === 0;
      line.className = `canvas-vline ${h === 0 ? 'day' : isMajor ? 'major' : 'hour'}`;
      line.style.left = toX(di, h) + 'px';
      canvas.appendChild(line);
    }
  });

  // NOW line on canvas
  const nowDateIdx2 = dates.indexOf(todayUTC());
  if (nowDateIdx2 >= 0) {
    const nowLine = document.createElement('div');
    nowLine.id = 'canvas-now-line';
    nowLine.style.left = toX(nowDateIdx2, nowHoursUTC()) + 'px';
    canvas.appendChild(nowLine);
  }

  // ── PLACE EVENT CARDS ─────────────────────────────────────────
  // Group by (dateIndex, rounded time bucket) to stack same-time events
  const groups = {};
  filtered.forEach(ev => {
    const di   = dates.indexOf(evDateUTC(ev));
    if (di < 0) return;
    const h    = evHoursUTC(ev);
    const key  = `${di}_${Math.round(h * 12)}`; // 5-min buckets
    if (!groups[key]) groups[key] = {di, h, evs:[]};
    groups[key].evs.push(ev);
  });

  Object.values(groups).forEach(({di, h, evs}) => {
    const x = toX(di, h);

    const col = document.createElement('div');
    col.className = 'time-col';
    col.style.left  = x + 'px';
    col.style.width = CARD_W + 'px';

    // Dot
    const dot = document.createElement('div');
    dot.className = 'time-col-dot';
    col.appendChild(dot);

    evs.forEach((ev, idx) => {
      const cd = calCountdown(ev.event_time);
      const t  = fmtTime(ev.event_time);

      const hasA = ev.actual   && ev.actual   !== '';
      const hasF = ev.forecast && ev.forecast !== '';
      const hasP = ev.previous && ev.previous !== '';

      const dataRow = (hasA||hasF||hasP) ? `
        <div class="cal-card-data">
          ${hasP?`<div class="cal-card-data-item"><span class="cal-card-data-label">Prev</span><span class="cal-card-data-val">${ev.previous}</span></div>`:''}
          ${hasF?`<div class="cal-card-data-item"><span class="cal-card-data-label">Fcst</span><span class="cal-card-data-val">${ev.forecast}</span></div>`:''}
          ${hasA?`<div class="cal-card-data-item"><span class="cal-card-data-label">Actual</span><span class="cal-card-data-val actual">${ev.actual}</span></div>`:''}
        </div>` : '';

      const aiBox = ev.analysis ? `
        <div class="cal-card-ai">
          <div class="cal-card-ai-label">
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
            AI Analysis
          </div>
          <div class="cal-card-ai-text">${ev.analysis}</div>
        </div>` : '';

      const card = document.createElement('div');
      card.className = `cal-card impact-${ev.impact}`;
      card.style.animationDelay = (idx * 40) + 'ms';
      card.innerHTML = `
        <div class="cal-card-top">
          <span class="cal-card-time">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${t}
          </span>
          <span class="cal-card-cur ${ev.currency}">${ev.currency}</span>
          <span class="cal-card-impact ${ev.impact}">${ev.impact}</span>
          <span class="cal-card-countdown ${cd.cls}">${cd.label}</span>
        </div>
        <div class="cal-card-name">${ev.title||ev.event||''}</div>
        ${aiBox}
        ${dataRow}
      `;
      col.appendChild(card);
    });

    canvas.appendChild(col);
  });

  // After render — set canvas height to fit tallest column
  requestAnimationFrame(() => {
    let maxH = 300;
    canvas.querySelectorAll('.time-col').forEach(col => {
      const b = col.offsetTop + col.offsetHeight + 32;
      if (b > maxH) maxH = b;
    });
    canvas.style.height = maxH + 'px';
    updateScrollHints();
  });
}

// ══════════════════════════════════════════════════════════════
//  SCROLL SYNC: ruler mirrors canvas horizontal scroll
// ══════════════════════════════════════════════════════════════
const scrollEl  = document.getElementById('timeline-scroll');
const rulerWrap = document.getElementById('timeline-ruler-wrap');

scrollEl.addEventListener('scroll', () => {
  rulerWrap.scrollLeft = scrollEl.scrollLeft;
  updateScrollHints();
});

function updateScrollHints() {
  // Could add arrows here if desired
}

// ── Drag to scroll ────────────────────────────────────────────
let _drag = false, _dragX = 0, _dragSL = 0;
scrollEl.addEventListener('mousedown', e => {
  _drag = true; _dragX = e.pageX; _dragSL = scrollEl.scrollLeft;
});
window.addEventListener('mouseup',   () => _drag = false);
window.addEventListener('mousemove', e => {
  if (!_drag) return;
  e.preventDefault();
  scrollEl.scrollLeft = _dragSL - (e.pageX - _dragX) * 1.1;
});

// ── Scroll to NOW ─────────────────────────────────────────────
function scrollToNow() {
  const dates = getTargetDates();
  const di    = dates.indexOf(todayUTC());
  if (di < 0) return;
  const nowX  = toX(di, nowHoursUTC());
  const target = Math.max(0, nowX - scrollEl.clientWidth / 2);
  scrollEl.scrollTo({left: target, behavior: 'smooth'});
}

// ══════════════════════════════════════════════════════════════
//  LOAD DATA
// ══════════════════════════════════════════════════════════════
async function loadCalendar() {
  try {
    const res  = await fetch('/api/calendar');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    _allEvents = data.events || [];
    buildTimeline();
    setTimeout(scrollToNow, 200);
  } catch(e) {
    document.getElementById('cal-loading').innerHTML =
      `<span style="color:var(--muted)">Could not load — ${e.message}</span>`;
  }
}

setInterval(() => { if (_allEvents.length) buildTimeline(); }, 30000);

// ══════════════════════════════════════════════════════════════
//  SIDE NAV
// ══════════════════════════════════════════════════════════════
{
  const nav = document.getElementById('side-nav');
  const tip = document.getElementById('nav-tooltip');
  const btn = document.getElementById('nav-collapse-btn');
  if (localStorage.getItem('nav-collapsed')==='1') nav.classList.add('collapsed');
  btn.addEventListener('click', () => {
    nav.classList.toggle('collapsed');
    localStorage.setItem('nav-collapsed', nav.classList.contains('collapsed')?'1':'0');
  });
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('mouseenter', e => {
      if (!nav.classList.contains('collapsed')) return;
      tip.textContent = item.dataset.label||'';
      tip.style.top = (e.currentTarget.getBoundingClientRect().top+6)+'px';
      tip.classList.add('visible');
    });
    item.addEventListener('mouseleave', () => tip.classList.remove('visible'));
  });
  const path = window.location.pathname.replace(/\/$/,'')||'/';
  document.querySelectorAll('.nav-item').forEach(item => {
    const href = (item.getAttribute('href')||'').replace(/\/$/,'')||'/';
    item.classList.toggle('active', href===path);
  });
}

loadCalendar();
</script>
