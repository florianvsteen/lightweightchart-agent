<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ pair_id }} — Macro Desk</title>
<link rel="stylesheet" href="/static/dashboard.css">
<style>
#main-content { overflow-y: auto; overflow-x: hidden; }

/* ── Back link ── */
#dd-back {
  padding: 12px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#dd-back a {
  font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  transition: color 0.15s;
}
#dd-back a:hover { color: var(--accent); }

/* ── Pair header ── */
#dd-header {
  display: flex; align-items: center; gap: 20px;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 80px;
}
#dd-icon {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 1.1rem; font-weight: 800;
  font-family: 'Syne', sans-serif; color: #fff; letter-spacing: 0.01em;
  background: linear-gradient(135deg, #1a3a5c 0%, #0d1f2d 100%);
  border: 2px solid rgba(90,158,240,0.3);
}
/* color variants per asset type */
#dd-icon.equity  { background: linear-gradient(135deg, #1a3a5c 0%, #0d1f2d 100%); border-color: rgba(90,158,240,0.3); }
#dd-icon.fx      { background: linear-gradient(135deg, #1a3a2c 0%, #0d1f15 100%); border-color: rgba(90,240,196,0.3); }
#dd-icon.commod  { background: linear-gradient(135deg, #3a2a10 0%, #1f1505 100%); border-color: rgba(200,168,75,0.4); }
#dd-icon.crypto  { background: linear-gradient(135deg, #2a1a3a 0%, #150d1f 100%); border-color: rgba(180,90,240,0.3); }
#dd-pair-name {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 2rem; color: #fff; line-height: 1; margin-bottom: 3px;
}
#dd-pair-label { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.06em; }

/* Stat boxes — right-aligned, individual bordered cards */
#dd-stat-boxes {
  display: flex;
  gap: 10px;
  margin-left: auto;
  flex-shrink: 0;
  align-items: center;
}
.dd-stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 20px;
  min-width: 120px;
  display: flex; flex-direction: column;
  gap: 4px;
}
.dd-stat-box-label {
  font-size: 0.5rem; color: var(--muted);
  letter-spacing: 0.16em; text-transform: uppercase;
}
.dd-stat-box-val {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem;
}
.dd-stat-box-val.bullish { color: var(--accent); }
.dd-stat-box-val.bearish { color: var(--accent2); }
.dd-stat-box-val.sell    { color: var(--accent2); }
.dd-stat-box-val.buy     { color: var(--accent); }
.dd-stat-box-val.neutral { color: var(--muted); }
.dd-stat-box-val.number  { color: #fff; }

/* ── Body: two columns ── */
#dd-body {
  display: grid;
  grid-template-columns: 420px 1fr;
  flex: 1;
  min-height: 0;
}
#dd-left  { background: var(--bg); display: flex; flex-direction: column; gap: 12px; padding: 16px; overflow-x: hidden; overflow-y: auto; min-width: 0; }
#dd-right { background: var(--bg); display: flex; flex-direction: column; gap: 12px; padding: 16px; overflow-x: hidden; overflow-y: auto; min-width: 0; }

/* ── Price + chart (left top) ── */
#dd-chart-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px 16px;
  flex-shrink: 0;
}
#dd-price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
#dd-price { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; color: #fff; line-height: 1; }
#dd-price-chg { font-size: 0.85rem; font-weight: 700; }
#dd-price-chg.up   { color: var(--accent); }
#dd-price-chg.down { color: var(--accent2); }

#dd-chart-wrap { height: 200px; position: relative; }
#dd-chart-canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }

/* ── News (left bottom) ── */
#dd-news-panel {
  flex: 1; display: flex; flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 0;
}
#dd-news-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--border);
  font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 800; color: #fff;
  border-radius: var(--radius) var(--radius) 0 0;
  flex-shrink: 0;
}
#dd-news-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
#dd-news-list::-webkit-scrollbar { width: 3px; }
#dd-news-list::-webkit-scrollbar-thumb { background: var(--border2); }
.dd-news-item { padding: 10px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; display: flex; flex-direction: column; gap: 3px; }
.dd-news-item:hover { background: rgba(255,255,255,0.03); }
.dd-news-meta { display: flex; align-items: center; gap: 6px; }
.dd-news-source { font-size: 0.5rem; color: var(--muted); letter-spacing: 0.06em; }
.dd-news-age    { font-size: 0.48rem; color: #333; margin-left: auto; }
.dd-news-sentiment { font-size: 0.46rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 5px; border-radius: 10px; border: 1px solid; }
.dd-news-sentiment.bullish { border-color: rgba(90,240,196,0.4); color: var(--accent); }
.dd-news-sentiment.bearish { border-color: rgba(240,90,126,0.4); color: var(--accent2); }
.dd-news-sentiment.neutral { border-color: var(--border2); color: var(--muted); }
.dd-news-headline { font-size: 0.68rem; font-weight: 700; color: var(--text); line-height: 1.4; }
.dd-news-summary  { font-size: 0.58rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ── Right column panels ── */
/* AI Overview */
#dd-overview-panel {
  padding: 16px 20px;
  flex-shrink: 0;
}
.dd-section-label {
  display: flex; align-items: center; gap: 7px;
  font-size: 0.56rem; font-weight: 700; color: var(--accent);
  letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px;
}
#dd-overview-text { font-size: 0.72rem; color: var(--text); line-height: 1.7; opacity: 0.9; }

/* Module row: Mood + Policy */
#dd-module-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-shrink: 0; min-width: 0; }
.dd-module {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  min-width: 0;
  overflow: hidden;
}
/* Rounded card wrapper for mood/policy content */
.dd-module-card {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-top: 8px;
  overflow: hidden;
  min-width: 0;
}
.dd-module-label { font-size: 0.5rem; color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.dd-module-age   { font-size: 0.48rem; color: #333; letter-spacing: 0.06em; }
.gauge-wrap { display: flex; align-items: flex-start; gap: 20px; }
.gauge-svg-wrap { flex-shrink: 0; }
.gauge-svg-wrap { flex-shrink: 0; }
.gauge-reading { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; letter-spacing: 0.06em; line-height: 1.1; text-transform: uppercase; margin-bottom: 6px; }
.gauge-desc { font-size: 0.62rem; color: var(--text); line-height: 1.55; opacity: 0.8; margin-top: 5px; }
.gauge-footer { margin-top: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 0.6rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.policy-word { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: 0.08em; margin-bottom: 7px; }

/* Bottom three: Flow / Bearing / Pulse — rounded cards like screenshot */
#dd-bottom-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  flex-shrink: 0;
}
.dd-bottom {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex; flex-direction: column; gap: 10px;
}

/* Flow — vertical bar chart visual */
.flow-bars {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 3px; height: 60px;
}
.flow-bar {
  width: 6px; border-radius: 3px;
  transition: height 0.4s ease, background 0.4s ease;
}

/* Bearing — jagged area chart */
.bearing-canvas { width: 100%; height: 70px; display: block; }

/* Pulse — heartbeat/flatline SVG */
.pulse-svg { width: 100%; height: 50px; display: block; }

/* Shared label */
.module-reading {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 1.2rem; letter-spacing: 0.04em; text-align: center;
  margin: 4px 0;
}

/* Slider (Flow + Pulse) */
.slider-wrap { margin: 2px 0 4px; }
.slider-track { height: 6px; border-radius: 3px; position: relative; }
.slider-thumb {
  position: absolute; top: 50%; transform: translate(-50%,-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff; border: 2px solid var(--accent);
  box-shadow: 0 0 8px rgba(90,240,196,0.4);
  transition: left 0.4s ease;
}
.slider-labels { display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.5rem; color: var(--muted); letter-spacing: 0.06em; }
.track-flow  { background: linear-gradient(90deg, #f0a028 0%, var(--accent) 50%, #f0a028 100%); }
.track-pulse { background: linear-gradient(90deg, var(--border2) 0%, var(--accent) 35%, #f0a028 65%, #f05050 100%); }

/* Bullet list (Bearing) */
.bullet-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.bullet-list li {
  font-size: 0.62rem; color: var(--text); line-height: 1.5;
  display: flex; gap: 8px; align-items: flex-start;
}
.bullet-list li::before { content: '•'; color: var(--accent); flex-shrink: 0; margin-top: 1px; font-size: 0.7rem; }

.module-desc { font-size: 0.62rem; color: var(--muted); line-height: 1.55; }

/* Skeleton */
.skel { background: linear-gradient(90deg, var(--border) 0%, var(--border2) 50%, var(--border) 100%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; display: block; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>

<script>
const PAIR_ID  = '{{ pair_id }}';
let _chart     = null;
let _period    = '5d';
let _interval  = '30m';

// ── Helpers ──
function drawSparkline(){} // legacy — kept for safety, not used
function fmtPrice(v, k) {
  if (v == null) return '—';
  if (['EURUSD','GBPUSD','EURGBP','AUDUSD','USDCAD','USDCHF','NZDUSD'].includes(k)) return v.toFixed(4);
  if (['USDJPY','EURJPY','GBPJPY','AUDJPY','CADJPY'].includes(k)) return v.toFixed(3);
  if (v > 1000) return v.toFixed(2);
  return v.toFixed(2);
}
function ageStr(m) {
  if (!m || m >= 999) return '';
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  return `${Math.floor(m/60)}h ago`;
}
function drawSparkline(id, trend, color) {
  const c = document.getElementById(id); if (!c) return;
  const w = c.offsetWidth||200, h = c.offsetHeight||55;
  c.width=w; c.height=h;
  const ctx=c.getContext('2d'); ctx.clearRect(0,0,w,h);
  const n=30, data=[]; let v=0.5;
  for(let i=0;i<n;i++){v+=((Math.random()-.5)*.1+trend*.02);v=Math.max(.05,Math.min(.95,v));data.push(v);}
  const xs=w/(n-1);
  const g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,color+'33'); g.addColorStop(1,color+'00');
  ctx.beginPath();
  data.forEach((d,i)=>{const x=i*xs,y=h-d*h;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=g;ctx.fill();
}

async function loadChart() {

      options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},
        plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(17,17,22,0.95)',borderColor:'#2a2a38',borderWidth:1,titleColor:'#4a4a60',bodyColor:'#c8c8d8',titleFont:{family:'Space Mono',size:9},bodyFont:{family:'Space Mono',size:11},callbacks:{label:c=>` ${c.parsed.y.toFixed(4)}`}}},
        scales:{x:{grid:{color:'rgba(255,255,255,0.03)',drawTicks:false},border:{display:false},ticks:{color:'#4a4a60',font:{family:'Space Mono',size:8},maxTicksLimit:8,maxRotation:0}},y:{position:'right',grid:{color:'rgba(255,255,255,0.03)',drawTicks:false},border:{display:false},ticks:{color:'#4a4a60',font:{family:'Space Mono',size:8},maxTicksLimit:6}}}}

// ── Pair analysis (bias, confidence, AI text) ──
// ── Pair icon: TradingView-style colored circle with short symbol ──
function setPairIcon(pairId) {
  const icon = document.getElementById('dd-icon');
  if (!icon) return;

  // Determine asset type and short label
  const equity  = ['US30','US100','SPX500'];
  const crypto  = ['BTCUSD','ETHUSD','SOLUSD'];
  const commod  = ['XAUUSD','XAGUSD','OIL','WTIUSD'];

  let type = 'fx', short = pairId.slice(0,2);
  if (equity.includes(pairId))  { type = 'equity'; short = pairId.replace('US','').replace('100','NDX').replace('30','DJI'); }
  if (crypto.includes(pairId))  { type = 'crypto'; short = pairId.replace('USD','').slice(0,3); }
  if (commod.includes(pairId))  { type = 'commod'; short = pairId === 'XAUUSD' ? 'Au' : pairId === 'XAGUSD' ? 'Ag' : 'OIL'; }
  if (type === 'fx')             { short = pairId.slice(0,3); }

  icon.className = type;
  icon.textContent = short;
}

async function loadAnalysis() {
  try {
    const r=await fetch(`/api/macro/pair/${PAIR_ID}`); const d=await r.json(); if(!d.ok) return;
    const data=d.data;
    const sent=(data.sentiment||'Neutral');
    const sentC=sent.charAt(0).toUpperCase()+sent.slice(1).toLowerCase();
    const conf=data.confidence||70;

    // Stat boxes
    const biasEl=document.getElementById('dd-bias');
    biasEl.textContent=sentC; biasEl.className=`dd-stat-box-val ${sent.toLowerCase()}`;
    document.getElementById('dd-technical').textContent=sent==='Bullish'?'Buy':sent==='Bearish'?'Sell':'Neutral';
    document.getElementById('dd-technical').className=`dd-stat-box-val ${sent==='Bullish'?'buy':sent==='Bearish'?'sell':'neutral'}`;
    document.getElementById('dd-confidence').textContent=`${conf}%`;

    // AI overview text
    document.getElementById('dd-overview-text').textContent=data.text||'Analysis unavailable.';
  } catch(e){}
}

// ── Macro modules ──
async function loadModules() {
  try {
    // Use pair-specific endpoint so all analysis is focused on THIS pair only
    const r=await fetch(`/api/macro/pair/${PAIR_ID}/modules`);
    const d=await r.json(); if(!d.ok) return;
    const m=d.modules||{};
    if(m.mood)    renderMood(m.mood);
    if(m.policy)  renderPolicy(m.policy);
    if(m.flow)    renderFlow(m.flow);
    if(m.bearing) renderBearing(m.bearing);
    if(m.pulse)   renderPulse(m.pulse);
  } catch(e){ console.error('modules error', e); }
}

// ── Segmented gauge (matches screenshot exactly) ──
function drawSegmentedGauge(score) {
  // score: -1 (extreme fear/risk-off) to +1 (euphoria/risk-on)
  const svg   = document.getElementById('gauge-ticks');
  if (!svg) return;
  svg.innerHTML = '';

  const cx = 80, cy = 78, r = 58;
  const startDeg = -180, endDeg = 0; // half circle
  const numSegs  = 24;
  const gap       = 3; // degrees gap between segments
  const segSpan   = (endDeg - startDeg) / numSegs;

  // Color ramp: left=red(risk-off), mid=grey(neutral), right=green(risk-on)
  const segColors = [
    '#e74c3c','#e74c3c','#f05050','#f05050',   // strong risk-off (0-3)
    '#f0a028','#f0a028',                         // risk-off (4-5)
    '#4a4a60','#4a4a60','#4a4a60','#4a4a60',    // neutral (6-9)
    '#4a4a60','#4a4a60','#4a4a60','#4a4a60',    // neutral (10-13)
    '#6ac040','#6ac040',                         // risk-on (14-15)
    '#50c840','#50c840','#50c840','#50c840',     // risk-on (16-19)
    '#2ecc71','#2ecc71','#2ecc71','#2ecc71',     // strong risk-on (20-23)
  ];

  // Which segment is "active" based on score (-1 to +1 → 0 to numSegs-1)
  const activeIdx = Math.round((score + 1) / 2 * (numSegs - 1));

  for (let i = 0; i < numSegs; i++) {
    const startAngle = (startDeg + i * segSpan + gap/2) * Math.PI / 180;
    const endAngle   = (startDeg + (i+1) * segSpan - gap/2) * Math.PI / 180;

    const x1 = cx + (r - 12) * Math.cos(startAngle);
    const y1 = cy + (r - 12) * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(startAngle);
    const y2 = cy + r * Math.sin(startAngle);
    const x3 = cx + r * Math.cos(endAngle);
    const y3 = cy + r * Math.sin(endAngle);
    const x4 = cx + (r - 12) * Math.cos(endAngle);
    const y4 = cy + (r - 12) * Math.sin(endAngle);

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const d    = `M ${x1} ${y1} L ${x2} ${y2} A ${r} ${r} 0 0 1 ${x3} ${y3} L ${x4} ${y4} A ${r-12} ${r-12} 0 0 0 ${x1} ${y1} Z`;
    path.setAttribute('d', d);
    path.setAttribute('fill', segColors[i] || '#4a4a60');
    path.setAttribute('opacity', i <= activeIdx ? '1' : '0.18');
    svg.appendChild(path);
  }
}

function renderMood(d) {
  // Score: -1 to +1. Map our labels to scores precisely.
  const LABEL_SCORES = {
    'EXTREME FEAR':     -1.0,
    'STRONG RISK-OFF':  -0.75,
    'RISK-OFF':         -0.45,
    'RISK-NEUTRAL':     -0.1,
    'NEUTRAL':           0.0,
    'RISK-ON':           0.45,
    'STRONG RISK-ON':    0.75,
    'EUPHORIA':          1.0,
  };
  const label = d.label || 'NEUTRAL';
  const score = d.score != null ? d.score : (LABEL_SCORES[label] ?? 0);

  // Needle: -180deg = far left, 0deg = far right, 0 score = -90deg
  const needleDeg = score * 90; // -90 to +90
  document.getElementById('mood-needle').style.transform = `rotate(${needleDeg}deg)`;

  // Draw segments
  drawSegmentedGauge(score);

  // Label color
  const labelColors = {
    'EXTREME FEAR':    '#e74c3c',
    'STRONG RISK-OFF': '#f05050',
    'RISK-OFF':        '#f0a028',
    'RISK-NEUTRAL':    '#4a4a60',
    'NEUTRAL':         '#888898',
    'RISK-ON':         '#6ac040',
    'STRONG RISK-ON':  '#2ecc71',
    'EUPHORIA':        '#2ecc71',
  };
  const color = labelColors[label] || '#888898';

  document.getElementById('mood-label').textContent = label;
  document.getElementById('mood-label').style.color  = color;
  document.getElementById('mood-desc').textContent   = d.explanation || '';
  document.getElementById('mood-age').textContent    = ageStr(d.age_min);

  const footerLabel = label.replace(/-/g,' ').replace(/\w/g, c => c.toUpperCase());
  document.getElementById('mood-footer').innerHTML =
    `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <strong style="color:var(--text)">${footerLabel}:</strong> ${d.explanation?.split('.')[0] || ''}`;
}
function renderPolicy(d) {
  const label=d.label||'NEUTRAL';
  const pc={'HAWKISH':'#f05050','SLIGHTLY HAWKISH':'#f0a028','NEUTRAL':'var(--muted)','SLIGHTLY DOVISH':'#6060f0','DOVISH':'var(--blue)'};
  const el=document.getElementById('policy-label'); el.textContent=label; el.style.color=pc[label]||'var(--muted)';
  document.getElementById('policy-desc').textContent=d.explanation||'';
  document.getElementById('policy-age').textContent=ageStr(d.age_min);
  document.getElementById('policy-footer').innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> <strong style="color:var(--text)">${label}:</strong> ${d.outlook||''}`;
}
// ── Flow: vertical bar chart (like screenshot) ──
function renderFlow(d) {
  const label = d.label || 'HEALTHY';
  const score = d.score || 0.5;
  const colors = { 'THIN': '#4a4a60', 'HEALTHY': '#5af0c4', 'CROWDED': '#f0a028' };
  const color  = colors[label] || '#5af0c4';

  const el = document.getElementById('flow-label');
  el.textContent = label; el.style.color = color;
  document.getElementById('flow-thumb').style.left = (score * 100) + '%';
  document.getElementById('flow-desc').textContent = d.explanation || '';

  // Draw vertical bar chart
  const container = document.getElementById('flow-bars');
  container.innerHTML = '';
  const numBars = 14;
  // Heights vary around the score — healthier = taller middle bars
  for (let i = 0; i < numBars; i++) {
    const center   = (numBars - 1) / 2;
    const dist     = Math.abs(i - center) / center;
    const baseH    = (1 - dist * 0.4) * score;
    const noise    = (Math.random() - 0.5) * 0.25;
    const heightPct = Math.max(0.1, Math.min(1, baseH + noise));
    const bar = document.createElement('div');
    bar.className = 'flow-bar';
    bar.style.height  = (heightPct * 54) + 'px';
    bar.style.background = color;
    bar.style.opacity = 0.5 + heightPct * 0.5;
    container.appendChild(bar);
  }
}

// ── Bearing: jagged area chart (like screenshot) ──
function renderBearing(d) {
  const label  = d.label || 'NEUTRAL';
  const colors = { 'STRONG UP':'#5af0c4', 'UP':'#5af0c4', 'NEUTRAL':'#4a4a60', 'DOWN':'#f05050', 'STRONG DOWN':'#f05050' };
  const color  = colors[label] || '#4a4a60';
  const trend  = label.includes('UP') ? 1 : label.includes('DOWN') ? -1 : 0;

  const el = document.getElementById('bearing-label');
  el.textContent = label; el.style.color = color;
  document.getElementById('bearing-bullets').innerHTML = (d.bullets || []).map(b => `<li>${b}</li>`).join('');

  // Draw jagged area chart on canvas
  const canvas = document.getElementById('bearing-canvas');
  const w = canvas.offsetWidth || 260;
  const h = 70;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  const pts = 20;
  const data = [];
  let v = trend > 0 ? 0.35 : trend < 0 ? 0.65 : 0.5;
  for (let i = 0; i < pts; i++) {
    v += (Math.random() - 0.5) * 0.18 + trend * 0.035;
    v  = Math.max(0.08, Math.min(0.92, v));
    data.push(v);
  }

  const xStep = w / (pts - 1);
  const grad  = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '55');
  grad.addColorStop(1, color + '00');

  ctx.beginPath();
  data.forEach((d, i) => {
    const x = i * xStep, y = h - d * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
}

// ── Pulse: heartbeat or flatline (like screenshot) ──
function renderPulse(d) {
  const label  = d.label || 'TRADEABLE';
  const score  = d.score || 0.5;
  const colors = { 'QUIET': '#4a4a60', 'TRADEABLE': '#5af0c4', 'WILD': '#f05050' };
  const color  = colors[label] || '#5af0c4';

  const el = document.getElementById('pulse-label');
  el.textContent = label; el.style.color = color;
  document.getElementById('pulse-thumb').style.left = (score * 100) + '%';
  document.getElementById('pulse-desc').textContent = d.explanation || '';

  // Draw heartbeat/pulse canvas
  const canvas = document.getElementById('pulse-canvas');
  const w = canvas.offsetWidth || 260;
  const h = 55;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  const mid = h / 2;
  ctx.beginPath();
  ctx.strokeStyle = color; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';

  if (label === 'QUIET') {
    // Flat line with tiny noise
    const pts = 60;
    for (let i = 0; i < pts; i++) {
      const x = (i / (pts-1)) * w;
      const y = mid + (Math.random() - 0.5) * 4;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
  } else if (label === 'WILD') {
    // Chaotic spikes
    const pts = 40;
    for (let i = 0; i < pts; i++) {
      const x = (i / (pts-1)) * w;
      const y = mid + (Math.random() - 0.5) * (h * 0.85);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
  } else {
    // Classic heartbeat: flat, sharp spike up, down, up, flat
    const seg = w / 3;
    ctx.moveTo(0, mid);
    ctx.lineTo(seg * 0.3, mid);
    ctx.lineTo(seg * 0.4, mid - h*0.35);
    ctx.lineTo(seg * 0.5, mid + h*0.2);
    ctx.lineTo(seg * 0.6, mid - h*0.15);
    ctx.lineTo(seg * 0.7, mid);
    ctx.lineTo(seg * 1.0 + seg * 0.3, mid);
    ctx.lineTo(seg * 1.0 + seg * 0.4, mid - h*0.35);
    ctx.lineTo(seg * 1.0 + seg * 0.5, mid + h*0.2);
    ctx.lineTo(seg * 1.0 + seg * 0.6, mid - h*0.15);
    ctx.lineTo(seg * 1.0 + seg * 0.7, mid);
    ctx.lineTo(w, mid);
  }
  ctx.stroke();
}

// ── News ──
async function loadNews() {
  try {
    const r=await fetch(`/api/news/${PAIR_ID}`); const d=await r.json();
    const list=document.getElementById('dd-news-list');
    const items=d.articles||[];
    if(!items.length){list.innerHTML='<div style="padding:16px 22px;font-size:0.58rem;color:var(--muted)">No news available</div>';return;}
    list.innerHTML=items.map(n=>`
      <div class="dd-news-item" onclick="window.open('${n.link||'#'}','_blank')">
        <div class="dd-news-meta">
          <span class="dd-news-source">${n.source||''}</span>
          <span class="dd-news-age">${n.age||''}</span>
          ${n.sentiment?`<span class="dd-news-sentiment ${n.sentiment}">${n.sentiment}</span>`:''}
        </div>
        <div class="dd-news-headline">${n.headline||''}</div>
        ${n.summary?`<div class="dd-news-summary">${n.summary}</div>`:''}
      </div>`).join('');
  } catch(e){document.getElementById('dd-news-list').innerHTML='<div style="padding:16px 22px;font-size:0.58rem;color:var(--muted)">Could not load news</div>';}
}
