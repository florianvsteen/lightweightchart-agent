<!DOCTYPE html>
<html>
<head>
    <title>{{ label }} — Chart Agent</title>
    <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1e1e1f;
            color: #d1d4dc;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            gap: 12px;
        }
        header {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
        }
        #detector-statuses {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .detector-status {
            display: flex;
            align-items: center;
            gap: 7px;
            background: #1a1d2e;
            border: 1px solid #2b2b43;
            border-radius: 5px;
            padding: 4px 12px;
            font-size: 0.78rem;
            transition: border-color 0.4s, background 0.4s;
        }
        .detector-status .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background 0.4s;
        }
        .detector-status .label-text { transition: color 0.4s; }

        .detector-status.state-looking { border-color: #2b2b43; }
        .detector-status.state-looking .indicator { background: #444; }
        .detector-status.state-looking .label-text { color: #666; }

        .detector-status.state-potential { border-color: #555; }
        .detector-status.state-potential .indicator {
            background: #aaa;
            box-shadow: 0 0 5px rgba(180,180,180,0.4);
        }
        .detector-status.state-potential .label-text { color: #bbb; }

        .detector-status.state-found { border-color: #888; background: #1e2030; }
        .detector-status.state-found .indicator {
            background: #ccc;
            box-shadow: 0 0 8px rgba(220,220,220,0.6);
        }
        .detector-status.state-found .label-text { color: #e0e0e0; font-weight: 600; }

        .detector-status.state-offline { border-color: #2b2b43; }
        .detector-status.state-offline .indicator { background: #333; }
        .detector-status.state-offline .label-text { color: #444; font-style: italic; }

        .detector-status.state-cooldown { border-color: #b8860b; background: #1e1c12; }
        .detector-status.state-cooldown .indicator {
            background: #d4a017;
            box-shadow: 0 0 6px rgba(212,160,23,0.5);
        }
        .detector-status.state-cooldown .label-text { color: #c9a227; font-weight: 600; }

        /* ── Weekend closed overlay ── */
        #weekend-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 12, 0.88);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }
        #weekend-overlay.visible { display: flex; }
        #weekend-overlay .wk-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #e0e0e0;
            letter-spacing: 0.08em;
        }
        #weekend-overlay .wk-sub { font-size: 0.8rem; color: #555; }
        #weekend-overlay .wk-countdown {
            font-size: 2rem;
            font-weight: 700;
            color: #3a3a5a;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
        }
        #weekend-overlay .wk-hint { font-size: 0.68rem; color: #333; }

        #interval-bar { display: flex; gap: 4px; margin-left: auto; }
        .tf-btn {
            background: none;
            border: 1px solid #2b2b43;
            border-radius: 4px;
            color: #666;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: inherit;
            padding: 3px 9px;
            transition: all 0.2s;
        }
        .tf-btn:hover { border-color: #888; color: #bbb; }
        .tf-btn.active { border-color: #d4d0d0; color: #d4d0d0; font-weight: 600; }

        /* ── Session badge ── */
        #session-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #2b2b43;
            border-radius: 4px;
            padding: 3px 10px;
            font-size: 0.75rem;
            color: #666;
            white-space: nowrap;
        }
        #session-badge .session-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #444;
        }
        #session-badge.inactive { border-color: #444; color: #555; }
        #session-badge.inactive .session-dot { background: #444; }
        #session-badge.asian    { border-color: #c8a84b; color: #c8a84b; }
        #session-badge.asian    .session-dot { background: #c8a84b; box-shadow: 0 0 5px rgba(200,168,75,0.5); }
        #session-badge.london   { border-color: #4b9ecd; color: #4b9ecd; }
        #session-badge.london   .session-dot { background: #4b9ecd; box-shadow: 0 0 5px rgba(75,158,205,0.5); }
        #session-badge.new_york { border-color: #6abf7b; color: #6abf7b; }
        #session-badge.new_york .session-dot { background: #6abf7b; box-shadow: 0 0 5px rgba(106,191,123,0.5); }

        /* ── Bias badge ── */
        #bias-badge {
            display: none;
            align-items: center;
            gap: 6px;
            border: 1px solid #2b2b43;
            border-radius: 4px;
            padding: 3px 10px;
            font-size: 0.75rem;
            color: #666;
            white-space: nowrap;
        }
        #bias-badge .bias-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; }
        #bias-badge.strong_bullish { border-color: #2ecc71; color: #2ecc71; background: rgba(46,204,113,0.06); }
        #bias-badge.strong_bullish .bias-dot { background: #2ecc71; box-shadow: 0 0 7px rgba(46,204,113,0.7); }
        #bias-badge.bullish  { border-color: #4caf82; color: #4caf82; }
        #bias-badge.bullish  .bias-dot { background: #4caf82; box-shadow: 0 0 5px rgba(76,175,130,0.5); }
        #bias-badge.bearish  { border-color: #cf6679; color: #cf6679; }
        #bias-badge.bearish  .bias-dot { background: #cf6679; box-shadow: 0 0 5px rgba(207,102,121,0.5); }
        #bias-badge.strong_bearish { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,0.06); }
        #bias-badge.strong_bearish .bias-dot { background: #e74c3c; box-shadow: 0 0 7px rgba(231,76,60,0.7); }
        #bias-badge.misaligned { border-color: #888; color: #666; }
        #bias-badge.misaligned .bias-dot { background: #555; }

        /* ── Misaligned warning banner ── */
        #misaligned-banner {
            display: none;
            padding: 4px 12px;
            background: rgba(240, 196, 90, 0.08);
            border: 1px solid rgba(240, 196, 90, 0.3);
            border-radius: 4px;
            font-size: 0.72rem;
            color: #c8a84b;
            white-space: nowrap;
        }

        #chart-container {
            flex: 1;
            border: 1px solid #2b2b43;
            border-radius: 4px;
            overflow: hidden;
        }
        #chart { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <header>
        <h1>{{ label }}</h1>
        <div id="detector-statuses">
            <!-- Status badges injected by JS -->
        </div>
        <div id="session-badge">
            <span class="session-dot"></span>
            <span id="session-label">--</span>
        </div>
        <div id="bias-badge">
            <span class="bias-dot"></span>
            <span id="bias-label">--</span>
        </div>
        <div id="misaligned-banner">⚡ Bias misaligned — lower confidence zones</div>
        <div id="interval-bar">
            <button class="tf-btn active" data-interval="1m">1m</button>
            <button class="tf-btn" data-interval="5m">5m</button>
            <button class="tf-btn" data-interval="15m">15m</button>
            <button class="tf-btn" data-interval="30m">30m</button>
            <button class="tf-btn" data-interval="1h">1h</button>
        </div>
    </header>

    <div id="chart-container">
        <div id="chart"></div>
    </div>

    <!-- Weekend closed overlay -->
    <div id="weekend-overlay">
        <div class="wk-title">⛔ Market Closed</div>
        <div class="wk-sub" id="wk-sub">Weekend halt — Fri 23:00 UTC to Sun 22:00 UTC</div>
        <div class="wk-countdown" id="wk-countdown">00:00:00</div>
        <div class="wk-hint" id="wk-hint">Resumes Sunday 22:00 UTC (forex market open)</div>
    </div>

    <script>
        const PAIR_ID = "{{ pair_id }}";
        const ALWAYS_OPEN = {{ 'true' if always_open else 'false' }};
        const TIMEZONE = "{{ timezone }}";

        const _urlParams = new URLSearchParams(window.location.search);
        const _screenshotCenterTs = _urlParams.get('center') ? parseInt(_urlParams.get('center')) : null;

        const _urlInterval = _urlParams.get('interval');
        let currentInterval = _urlInterval || "{{ default_interval }}";

        // Helper to keep buttons in sync with logic
        function updateIntervalButtons(activeIv) {
            document.querySelectorAll('.tf-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.interval === activeIv);
            });
        }
        updateIntervalButtons(currentInterval);

        // ── Timezone offset ───────────────────────────────────────────
        function getTzOffsetSeconds(tz) {
            try {
                const now = new Date();
                const utcStr = now.toLocaleString('en-US', { timeZone: 'UTC' });
                const tzStr  = now.toLocaleString('en-US', { timeZone: tz });
                const diff   = (new Date(tzStr) - new Date(utcStr)) / 1000;
                return diff;
            } catch(e) { return 0; }
        }
        const TZ_OFFSET = getTzOffsetSeconds(TIMEZONE);

        // Expose for Playwright screenshot centering
        window._tzOffset = TZ_OFFSET;

        function shiftTime(ts) { return ts + TZ_OFFSET; }
        let currentInterval = "{{ default_interval }}";

        // ── Candle countdown timer ─────────────────────────────────────
        function intervalToSeconds(interval) {
            const match = interval.match(/^(\d+)(m|h|d|w)$/);
            if (!match) return 60;
            const val = parseInt(match[1], 10);
            const unit = match[2];
            if (unit === 'm') return val * 60;
            if (unit === 'h') return val * 3600;
            if (unit === 'd') return val * 86400;
            if (unit === 'w') return val * 604800;
            return 60;
        }

        function getCandleCountdown(intervalSecs) {
            const nowSecs = Math.floor(Date.now() / 1000);
            const candleStart = nowSecs - (nowSecs % intervalSecs);
            const candleEnd = candleStart + intervalSecs;
            const remaining = candleEnd - nowSecs;
            return Math.max(0, remaining);
        }

        function formatCountdown(secs) {
            if (secs >= 3600) {
                const h = Math.floor(secs / 3600);
                const m = Math.floor((secs % 3600) / 60);
                const s = secs % 60;
                return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        let _countdownPriceLine = null;
        let _lastPrice = null;
        let _countdownTimer = null;

        function updateCandleCountdown() {
            if (_lastPrice === null) return;
            const intervalSecs = intervalToSeconds(currentInterval);
            const remaining = getCandleCountdown(intervalSecs);
            const countdownStr = formatCountdown(remaining);

            if (_countdownPriceLine) {
                try { candleSeries.removePriceLine(_countdownPriceLine); } catch(e) {}
            }

            _countdownPriceLine = candleSeries.createPriceLine({
                price: _lastPrice,
                color: 'rgba(90, 240, 196, 0.9)',
                lineWidth: 1,
                lineStyle: 0,
                axisLabelVisible: true,
                title: countdownStr,
                lineVisible: false,
            });
        }

        function startCandleCountdownTimer() {
            if (_countdownTimer) clearInterval(_countdownTimer);
            _countdownTimer = setInterval(updateCandleCountdown, 1000);
            updateCandleCountdown();
        }

        // ── Session clock ─────────────────────────────────────────────
        const SESSION_LABELS = { asian: 'Asian', london: 'London', new_york: 'New York' };
        const SESSION_WINDOWS_UTC = [
            { name: 'asian',    start: 1,  end: 7  },
            { name: 'london',   start: 8,  end: 12 },
            { name: 'new_york', start: 13, end: 19 },
        ];

        function getCurrentSession() {
            const hour = new Date().getUTCHours();
            for (const s of SESSION_WINDOWS_UTC) {
                if (hour >= s.start && hour < s.end) return s.name;
            }
            return null;
        }

        function getNextSession() {
            const now     = new Date();
            const utcHour = now.getUTCHours();
            let next = SESSION_WINDOWS_UTC.find(s => s.start > utcHour);
            if (!next) next = SESSION_WINDOWS_UTC[0];
            const target = new Date(now);
            target.setUTCHours(next.start, 0, 0, 0);
            if (target <= now) target.setUTCDate(target.getUTCDate() + 1);
            const diffMs = target - now;
            const diffH  = Math.floor(diffMs / 3600000);
            const diffM  = Math.floor((diffMs % 3600000) / 60000);
            const diffS  = Math.floor((diffMs % 60000) / 1000);
            const pad    = n => String(n).padStart(2, '0');
            return { name: next.name, countdown: `${pad(diffH)}:${pad(diffM)}:${pad(diffS)}` };
        }

        function updateSessionBadge() {
            const session = getCurrentSession();
            const badge   = document.getElementById('session-badge');
            if (session) {
                badge.className = session;
                document.getElementById('session-label').textContent = SESSION_LABELS[session] + ' Session';
            } else {
                const next = getNextSession();
                badge.className = 'inactive';
                document.getElementById('session-label').textContent =
                    SESSION_LABELS[next.name] + ' opens in ' + next.countdown;
            }
        }

        updateSessionBadge();
        setInterval(updateSessionBadge, 1000);

        // ── Interval buttons ─────────────────────────────────────────
        document.querySelectorAll('.tf-btn').forEach(btn => {
            if (btn.dataset.interval === currentInterval) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        document.querySelectorAll('.tf-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentInterval = btn.dataset.interval;
                loadData();
            });
        });

        // ── Chart Setup ──────────────────────────────────────────────
        const container = document.getElementById('chart');
        const chart = LightweightCharts.createChart(container, {
            layout: { background: { color: '#1e1e1f' }, textColor: '#d1d4dc' },
            grid: { vertLines: { visible: false }, horzLines: { visible: false } },
            timeScale: { timeVisible: true, borderColor: '#2B2B43' },
        });

        // Expose chart reference and raw candles for Playwright screenshot centering
        window._chartRef = chart;
        window._rawCandles = [];

        function getPriceFormat(pairId) {
            const forex5 = ['EURUSD', 'EURGBP', 'GBPUSD'];
            if (forex5.includes(pairId))     return { type: 'price', precision: 5, minMove: 0.00001 };
            if (pairId === 'XAUUSD')         return { type: 'price', precision: 2, minMove: 0.01   };
            if (pairId === 'BTCUSD')         return { type: 'price', precision: 0, minMove: 1       };
            return { type: 'price', precision: 0, minMove: 1 };
        }

        const candleSeries = chart.addCandlestickSeries({
            upColor:       '#d4d0d0',
            downColor:     '#068c76',
            wickUpColor:   '#d4d0d0',
            wickDownColor: '#068c76',
            borderVisible: false,
            wickVisible:   true,
            priceFormat:   getPriceFormat(PAIR_ID),
        });

        // ── Status Badge helpers ──────────────────────────────────────
        const statusContainer = document.getElementById('detector-statuses');
        const statusEls = {};

        const STATUS_CONFIG = {
            looking:              { label: 'Looking for accumulation',          css: 'state-looking'   },
            potential:            { label: 'Potential accumulation forming',     css: 'state-potential' },
            active:               { label: 'Accumulation forming',               css: 'state-potential' },
            found:                { label: 'Accumulation found',                 css: 'state-found'     },
            confirmed:            { label: 'Aggressor candle confirmed ✓',       css: 'state-found'     },
            cooldown:             { label: 'Cooldown — resuming in …',           css: 'state-cooldown'  },
            out_of_session:       { label: 'Out of session',                     css: 'state-offline'   },
            open_not_in_session:  { label: 'Open — not in session',              css: 'state-looking'   },
            weekend_closed:       { label: 'Market closed — weekend',            css: 'state-offline'   },
            sd_found:             { label: 'Supply/Demand zones found',          css: 'state-found'     },
            sd_misaligned_found:  { label: 'Zones found (bias misaligned ⚡)',   css: 'state-potential' },
            sd_none:              { label: 'No S/D zones found',                 css: 'state-looking'   },
            sd_misaligned:        { label: 'Bias misaligned — scanning both',    css: 'state-potential' },
            sd_bullish:           { label: 'Bias bullish — seeking demand',      css: 'state-found'     },
            sd_bearish:           { label: 'Bias bearish — seeking supply',      css: 'state-found'     },
            sd_strong_bullish:    { label: 'Strong bullish — seeking demand ★',  css: 'state-found'     },
            sd_strong_bearish:    { label: 'Strong bearish — seeking supply ★',  css: 'state-found'     },
            sd_weekend:           { label: 'Market closed — weekend',            css: 'state-offline'   },
        };

        // ── Weekend check ─────────────────────────────────────────────
        function isWeekendHalt() {
            if (ALWAYS_OPEN) return false;
            const now = new Date();
            const dow  = now.getUTCDay();
            const hour = now.getUTCHours();
            if (dow === 5 && hour >= 23) return true;
            if (dow === 6) return true;
            if (dow === 0 && hour < 22) return true;
            return false;
        }

        function getWeekendCountdown() {
            const now = new Date();
            const target = new Date(now);
            const dow = now.getUTCDay();
            let daysUntilSun = (0 - dow + 7) % 7;
            if (daysUntilSun === 0 && now.getUTCHours() >= 22) daysUntilSun = 7;
            target.setUTCDate(target.getUTCDate() + daysUntilSun);
            target.setUTCHours(22, 0, 0, 0);
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const pad = n => String(n).padStart(2, '0');
            return `${pad(h)}:${pad(m)}:${pad(s)}`;
        }

        function ensureStatusEl(detectorName) {
            if (statusEls[detectorName]) return statusEls[detectorName];
            const el = document.createElement('div');
            el.className = 'detector-status state-looking';
            el.innerHTML = `<span class="indicator"></span><span class="label-text"></span>`;
            statusContainer.appendChild(el);
            statusEls[detectorName] = el;
            return el;
        }

        function setStatus(detectorName, state) {
            const el = ensureStatusEl(detectorName);
            const cfg = STATUS_CONFIG[state] || STATUS_CONFIG.looking;
            el.className = `detector-status ${cfg.css}`;
            el.querySelector('.label-text').textContent = cfg.label;
        }

        // ── Box drawing helper ────────────────────────────────────────
        function drawFilledBox(startTs, endTs, top, bottom, lineColor, fillAlpha) {
            const toRgba = (color, alpha) => {
                const m = color.match(/rgba?\((\d+)[,\s]+(\d+)[,\s]+(\d+)/);
                return m ? `rgba(${m[1]},${m[2]},${m[3]},${alpha})` : color;
            };
            const s = shiftTime(startTs), e = shiftTime(endTs);
            const lOpts = { color: lineColor, lineWidth: 1, lineStyle: 0,
                priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false };

            const tl = chart.addLineSeries(lOpts);
            tl.setData([{ time: s, value: top }, { time: e, value: top }]);
            const bl = chart.addLineSeries(lOpts);
            bl.setData([{ time: s, value: bottom }, { time: e, value: bottom }]);
            const fl = chart.addBaselineSeries({
                baseValue: { type: 'price', price: bottom },
                topFillColor1: toRgba(lineColor, fillAlpha), topFillColor2: toRgba(lineColor, fillAlpha),
                topLineColor: 'rgba(0,0,0,0)',
                bottomFillColor1: 'rgba(0,0,0,0)', bottomFillColor2: 'rgba(0,0,0,0)',
                bottomLineColor: 'rgba(0,0,0,0)',
                lineWidth: 0,
                priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
            });
            fl.setData([{ time: s, value: top }, { time: e, value: top }]);
            return [tl, bl, fl];
        }

        // ── Detector Overlay Renderers ────────────────────────────────
        const detectorRenderers = {
            accumulation:  renderAccumulation,
            supply_demand: renderSupplyDemand,
        };

        const activeSeries = {};

        function renderAccumulation(chart, zone) {
            const isFound    = zone.status === 'found' || zone.status === 'confirmed';
            const isCooldown = zone.status === 'cooldown';
            if (!zone.top || !zone.bottom || !zone.start) return [];

            const allSeries = [];

            let lineAlpha, lineColor, lineStyle;
            if (isCooldown) {
                lineAlpha = 0.60;
                lineColor = `rgba(212, 160, 23, ${lineAlpha})`;
                lineStyle = 1;
            } else {
                lineAlpha = isFound ? 0.55 : 0.28;
                lineColor = `rgba(200, 200, 200, ${lineAlpha})`;
                lineStyle = isFound ? 0 : 2;
            }
            const seriesOpts = { color: lineColor, lineWidth: 1, lineStyle,
                priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false };

            const topLine = chart.addLineSeries(seriesOpts);
            topLine.setData([
                { time: shiftTime(zone.start), value: zone.top },
                { time: shiftTime(zone.end),   value: zone.top },
            ]);
            const bottomLine = chart.addLineSeries(seriesOpts);
            bottomLine.setData([
                { time: shiftTime(zone.start), value: zone.bottom },
                { time: shiftTime(zone.end),   value: zone.bottom },
            ]);
            const leftLine = chart.addLineSeries(seriesOpts);
            leftLine.setData([
                { time: shiftTime(zone.start), value: zone.top },
                { time: shiftTime(zone.start), value: zone.bottom },
            ]);
            const rightLine = chart.addLineSeries(seriesOpts);
            rightLine.setData([
                { time: shiftTime(zone.end), value: zone.top },
                { time: shiftTime(zone.end), value: zone.bottom },
            ]);
            allSeries.push(topLine, bottomLine, leftLine, rightLine);

            if (isCooldown) {
                const cooldownFill = chart.addBaselineSeries({
                    baseValue: { type: 'price', price: zone.bottom },
                    topFillColor1: 'rgba(212, 160, 23, 0.07)',
                    topFillColor2: 'rgba(212, 160, 23, 0.07)',
                    topLineColor: 'rgba(0,0,0,0)',
                    bottomFillColor1: 'rgba(0,0,0,0)', bottomFillColor2: 'rgba(0,0,0,0)',
                    bottomLineColor: 'rgba(0,0,0,0)',
                    lineWidth: 0,
                    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
                });
                cooldownFill.setData([
                    { time: shiftTime(zone.start), value: zone.top },
                    { time: shiftTime(zone.end),   value: zone.top },
                ]);
                allSeries.push(cooldownFill);
            }

            const bc = zone.breakout_candle;
            if (bc && bc.time != null) {
                const isBullish = bc.close > bc.open;
                const aggrColor = isBullish
                    ? 'rgba(240, 170, 50, 0.85)'
                    : 'rgba(240, 100, 50, 0.85)';

                const candleWidthSecs = 60;
                const aggrEnd = bc.time + candleWidthSecs;

                const aggrSeries = drawFilledBox(bc.time, aggrEnd, bc.high, bc.low, aggrColor, 0.18);
                allSeries.push(...aggrSeries);

                const bodyTop    = Math.max(bc.open, bc.close);
                const bodyBottom = Math.min(bc.open, bc.close);
                const bodyOpts   = { color: aggrColor, lineWidth: 2, lineStyle: 0,
                    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false };
                const btl = chart.addLineSeries(bodyOpts);
                btl.setData([{ time: shiftTime(bc.time), value: bodyTop },
                             { time: shiftTime(aggrEnd),  value: bodyTop }]);
                const bbl = chart.addLineSeries(bodyOpts);
                bbl.setData([{ time: shiftTime(bc.time), value: bodyBottom },
                             { time: shiftTime(aggrEnd),  value: bodyBottom }]);
                allSeries.push(btl, bbl);
            }

            const fvg = zone.fvg_candle;
            if (fvg && fvg.top != null && fvg.bottom != null && fvg.time != null) {
                const isBullish = fvg.fvg_type === 'bullish';
                const fvgColor = isBullish ? 'rgba(70, 130, 220, 0.55)' : 'rgba(220, 100, 50, 0.55)';
                const fvgOpts = { color: fvgColor, lineWidth: 1, lineStyle: 0,
                    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false };

                const fvgEnd   = shiftTime(zone.end);
                const fvgStart = shiftTime(fvg.time);

                const fTop  = chart.addLineSeries(fvgOpts);
                fTop.setData([{ time: fvgStart, value: fvg.top }, { time: fvgEnd, value: fvg.top }]);
                const fBot  = chart.addLineSeries(fvgOpts);
                fBot.setData([{ time: fvgStart, value: fvg.bottom }, { time: fvgEnd, value: fvg.bottom }]);
                const fLeft = chart.addLineSeries(fvgOpts);
                fLeft.setData([{ time: fvgStart, value: fvg.top }, { time: fvgStart, value: fvg.bottom }]);
                const fRight= chart.addLineSeries(fvgOpts);
                fRight.setData([{ time: fvgEnd, value: fvg.top }, { time: fvgEnd, value: fvg.bottom }]);
                const fFill = chart.addBaselineSeries({
                    baseValue: { type: 'price', price: fvg.bottom },
                    topFillColor1: 'rgba(70,130,220,0.12)', topFillColor2: 'rgba(70,130,220,0.12)',
                    topLineColor: 'rgba(0,0,0,0)',
                    bottomFillColor1: 'rgba(0,0,0,0)', bottomFillColor2: 'rgba(0,0,0,0)',
                    bottomLineColor: 'rgba(0,0,0,0)',
                    lineWidth: 0,
                    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
                });
                fFill.setData([{ time: fvgStart, value: fvg.top }, { time: fvgEnd, value: fvg.top }]);
                allSeries.push(fTop, fBot, fLeft, fRight, fFill);
            }

            return allSeries;
        }

        function _biasLabel(bias) {
            switch(bias) {
                case 'strong_bullish': return '⬆⬆ Strong Bullish (D+W)';
                case 'bullish':        return '↑ Bullish (D+W)';
                case 'bearish':        return '↓ Bearish (D+W)';
                case 'strong_bearish': return '⬇⬇ Strong Bearish (D+W)';
                default:               return '⚡ Bias Misaligned';
            }
        }

        function updateBiasBadge(bias) {
            const badge  = document.getElementById('bias-badge');
            const label  = document.getElementById('bias-label');
            const banner = document.getElementById('misaligned-banner');
            if (!bias) { badge.style.display = 'none'; banner.style.display = 'none'; return; }
            badge.style.display = 'flex';
            badge.className = bias.bias || 'misaligned';
            label.textContent = _biasLabel(bias.bias);
            banner.style.display = (bias.bias === 'misaligned') ? '' : 'none';
        }

        function renderSupplyDemand(chart, result) {
            const allSeries = [];
            const zones = Array.isArray(result) ? result : (result && result.zones ? result.zones : []);
            const bias  = result && result.bias ? result.bias : null;

            updateBiasBadge(bias);
            if (!zones.length) return allSeries;

            const urlParams   = new URLSearchParams(window.location.search);
            const highlightTs = urlParams.get('highlight') ? parseInt(urlParams.get('highlight')) : null;
            const isMisaligned = bias && bias.bias === 'misaligned';

            zones.forEach(zone => {
                const isDemand      = zone.type === 'demand';
                const isHighlighted = !highlightTs || zone.start === highlightTs;
                const zoneIsMisaligned = zone.is_misaligned || isMisaligned;

                let color, fill;
                if (zoneIsMisaligned) {
                    color = isHighlighted ? 'rgba(200, 160, 40, 0.8)'  : 'rgba(200, 160, 40, 0.2)';
                    fill  = isHighlighted ? 'rgba(200, 160, 40, 0.12)' : 'rgba(200, 160, 40, 0.04)';
                } else {
                    color = isDemand
                        ? (isHighlighted ? 'rgba(70, 130, 220, 0.9)'  : 'rgba(70, 130, 220, 0.15)')
                        : (isHighlighted ? 'rgba(220, 100, 50, 0.9)'  : 'rgba(220, 100, 50, 0.15)');
                    fill  = isDemand
                        ? (isHighlighted ? 'rgba(70, 130, 220, 0.18)' : 'rgba(70, 130, 220, 0.03)')
                        : (isHighlighted ? 'rgba(220, 100, 50, 0.18)' : 'rgba(220, 100, 50, 0.03)');
                }
                const lineWidth = isHighlighted ? 2 : 1;

                const topLine = chart.addLineSeries({ color, lineWidth, lineStyle: 0,
                    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
                topLine.setData([{ time: shiftTime(zone.start), value: zone.top },
                                 { time: shiftTime(zone.end),   value: zone.top }]);

                const bottomLine = chart.addLineSeries({ color, lineWidth, lineStyle: 0,
                    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
                bottomLine.setData([{ time: shiftTime(zone.start), value: zone.bottom },
                                    { time: shiftTime(zone.end),   value: zone.bottom }]);

                const fillSeries = chart.addBaselineSeries({
                    baseValue: { type: 'price', price: zone.bottom },
                    topFillColor1: fill, topFillColor2: fill,
                    topLineColor: 'rgba(0,0,0,0)',
                    bottomFillColor1: 'rgba(0,0,0,0)', bottomFillColor2: 'rgba(0,0,0,0)',
                    bottomLineColor: 'rgba(0,0,0,0)',
                    lineWidth: 0,
                    priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
                });
                fillSeries.setData([{ time: shiftTime(zone.start), value: zone.top },
                                    { time: shiftTime(zone.end),   value: zone.top }]);

                allSeries.push(topLine, bottomLine, fillSeries);
            });

            return allSeries;
        }

        // ── Cooldown countdown timer ──────────────────────────────────
        let _cooldownTimer   = null;
        let _cooldownUntilTs = 0;

        function startCooldownTimer(cooldownUntilEpoch) {
            if (_cooldownTimer && _cooldownUntilTs === cooldownUntilEpoch) {
                _updateCooldownLabel();
                return;
            }
            stopCooldownTimer();
            _cooldownUntilTs = cooldownUntilEpoch;
            _updateCooldownLabel();
            _cooldownTimer = setInterval(() => {
                const remaining = _cooldownUntilTs - Math.floor(Date.now() / 1000);
                if (remaining <= 0) {
                    stopCooldownTimer();
                    for (const [, seriesList] of Object.entries(activeSeries)) {
                        (seriesList || []).forEach(s => { try { chart.removeSeries(s); } catch(e){} });
                    }
                    Object.keys(activeSeries).forEach(k => delete activeSeries[k]);
                    setStatus('accumulation', 'looking');
                    return;
                }
                _updateCooldownLabel();
            }, 1000);
        }

        function stopCooldownTimer() {
            if (_cooldownTimer) { clearInterval(_cooldownTimer); _cooldownTimer = null; }
            _cooldownUntilTs = 0;
        }

        function _updateCooldownLabel() {
            const remaining = Math.max(0, _cooldownUntilTs - Math.floor(Date.now() / 1000));
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            const pad = n => String(n).padStart(2, '0');
            const el = ensureStatusEl('accumulation');
            el.className = 'detector-status state-cooldown';
            el.querySelector('.label-text').textContent = `Cooldown — resuming in ${pad(m)}:${pad(s)}`;
        }

        // ── Chart centering for screenshot mode (Playwright) ──────────
        window._screenshotReady = false;
        let _screenshotCentered = false;
        function maybeCenterOnScreenshot(candles) {
            if (_screenshotCentered || !_screenshotCenterTs || !candles.length) return;
            _screenshotCentered = true;

            // Find the logical index of the target candle
            let bestIdx = 0, bestDiff = Infinity;
            for (let i = 0; i < candles.length; i++) {
                const diff = Math.abs(candles[i].time - _screenshotCenterTs);
                if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
            }

            // Show ~80 bars total, target candle at ~65% from left (space to the right)
            const totalBars = 120;
            const rightPad  = Math.round(totalBars * 0.35);
            const from = bestIdx - (totalBars - rightPad);
            const to   = bestIdx + rightPad;
            try {
                chart.timeScale().setVisibleLogicalRange({ from, to });
            } catch(e) {}

            // Signal Playwright that centering is complete
            window._screenshotReady = true;
        }

        // ── Data Loop ─────────────────────────────────────────────────
        function showClosedOverlay(reason) {
            const overlay = document.getElementById('weekend-overlay');
            const sub     = document.getElementById('wk-sub');
            const hint    = document.getElementById('wk-hint');
            const cd      = document.getElementById('wk-countdown');
            if (reason === 'weekend') {
                sub.textContent  = 'Weekend halt — Fri 23:00 UTC to Sun 22:00 UTC';
                hint.textContent = 'Resumes Sunday 22:00 UTC (forex market open)';
                cd.textContent   = getWeekendCountdown();
                cd.style.display = '';
            } else {
                sub.textContent  = 'No market data available — exchange may be closed';
                hint.textContent = 'Chart will resume automatically when data is available';
                cd.style.display = 'none';
            }
            overlay.classList.add('visible');
        }

        function hideClosedOverlay() {
            document.getElementById('weekend-overlay').classList.remove('visible');
        }

        function loadData() {
            if (isWeekendHalt()) { showClosedOverlay('weekend'); return; }
            fetch(`/api/data?interval=${currentInterval}`)
                .then(res => res.json())
                .then(data => {
                    if (!data.candles || data.candles.length === 0) {
                        showClosedOverlay('no_data');
                        return;
                    }
                    hideClosedOverlay();

                    window._rawCandles = data.candles;
                    candleSeries.setData(data.candles.map(c => ({ ...c, time: shiftTime(c.time) })));

                    if (data.candles.length > 0) {
                        _lastPrice = data.candles[data.candles.length - 1].close;
                        startCandleCountdownTimer();
                    }

                    maybeCenterOnScreenshot(data.candles);

                    // Clear old drawings
                    for (const [name, seriesList] of Object.entries(activeSeries)) {
                        (seriesList || []).forEach(s => { try { chart.removeSeries(s); } catch(e){} });
                        delete activeSeries[name];
                    }

                    const detectors = data.detectors || {};
                    for (const [name, result] of Object.entries(detectors)) {
                        const renderer = detectorRenderers[name];
                        if (!result || !renderer) continue;

                        if (name === 'accumulation') {
                            // Handle both Single-TF (object) and Multi-TF (nested dictionary)
                            let zonesToRender = [];
                            let primaryStatus = 'looking';

                            if (result.status) {
                                zonesToRender = [result];
                                primaryStatus = result.status;
                            } else {
                                // Multi-timeframe result: {"1m": {...}, "3m": {...}}
                                const tfs = Object.values(result);
                                zonesToRender = tfs.filter(z => z);
                                
                                // Prioritize the most urgent status for the badge
                                if (tfs.some(z => z?.status === 'confirmed')) primaryStatus = 'confirmed';
                                else if (tfs.some(z => z?.status === 'found')) primaryStatus = 'found';
                                else if (tfs.some(z => z?.status === 'active')) primaryStatus = 'active';
                                else if (tfs.some(z => z?.status === 'cooldown')) primaryStatus = 'cooldown';
                            }

                            // Render all boxes from all timeframes
                            zonesToRender.forEach(z => {
                                const series = renderer(chart, z);
                                activeSeries[name] = (activeSeries[name] || []).concat(series);
                            });

                            setStatus(name, primaryStatus);
                            if (primaryStatus === 'cooldown') {
                                // Find the latest cooldown timestamp among all TFs
                                const maxCD = Math.max(...zonesToRender.map(z => z.cooldown_until || 0));
                                startCooldownTimer(maxCD);
                            } else {
                                stopCooldownTimer();
                            }

                        } else if (name === 'supply_demand') {
                            // ... existing supply_demand logic ...
                            activeSeries[name] = renderer(chart, result);
                            const bias = result.bias || {};
                            updateBiasBadge(bias);
                            setStatus(name, result.zones?.length > 0 ? 'sd_found' : 'sd_none');
                        }
                    }
                })
                .catch(err => console.error('Fetch error:', err));
        }

        setInterval(loadData, 60 * 1000);
        loadData();

        window.addEventListener('resize', () => chart.applyOptions({ width: container.clientWidth }));
    </script>
</body>
