<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Desk — The Inner Flows</title>
<link rel="stylesheet" href="/static/dashboard.css">
<style>
/* ══════════════════════════════════════════════════════════════
   MACRO DESK PAGE
   ══════════════════════════════════════════════════════════════ */

#main-content { overflow-y: auto; }

/* Page header */
#macro-header {
  padding: 24px 32px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 16px;
  flex-wrap: wrap;
}
#macro-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  color: #fff;
  letter-spacing: -0.01em;
  line-height: 1;
}
#macro-sub {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-top: 4px;
}
#macro-refresh-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--muted);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 6px 14px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 7px;
}
#macro-refresh-btn:hover { color: var(--accent); border-color: rgba(90,240,196,0.4); }
#macro-refresh-btn.loading { color: var(--accent); border-color: rgba(90,240,196,0.4); }
.spin { animation: spin 0.8s linear infinite; display: inline-block; }

/* ── Ticker strip ── */
#ticker-strip {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
#ticker-strip::-webkit-scrollbar { display: none; }
.ticker-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  border-right: 1px solid var(--border);
  white-space: nowrap;
  flex-shrink: 0;
  cursor: pointer;
  transition: background 0.15s;
}
.ticker-item:hover { background: rgba(255,255,255,0.03); }
.ticker-item.active { background: rgba(90,240,196,0.05); }
.ticker-name {
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.ticker-price {
  font-size: 0.8rem;
  font-weight: 700;
  color: #fff;
  font-variant-numeric: tabular-nums;
}
.ticker-chg {
  font-size: 0.62rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
}
.ticker-chg.up   { color: var(--accent);  background: rgba(90,240,196,0.1); }
.ticker-chg.down { color: var(--accent2); background: rgba(240,90,126,0.1); }
.ticker-chg.flat { color: var(--muted);  background: rgba(255,255,255,0.05); }

/* ── Main grid ── */
#macro-grid {
  display: grid;
  grid-template-columns: 340px 1fr;
  grid-template-rows: auto;
  gap: 1px;
  background: var(--border);
  flex: 1;
}

/* Left column */
#macro-left {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border-right: 1px solid var(--border);
}

/* Right column */
#macro-right {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  gap: 1px;
}

/* ── Chart panel (top left) ── */
#chart-panel {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#chart-symbol-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
#chart-symbol-name {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.6rem;
  color: #fff;
  line-height: 1;
}
#chart-symbol-chg {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
}
#chart-symbol-chg.up   { color: var(--accent);  background: rgba(90,240,196,0.1); }
#chart-symbol-chg.down { color: var(--accent2); background: rgba(240,90,126,0.1); }

.chart-period-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 2px 8px;
  margin-left: auto;
  transition: all 0.15s;
}
.chart-period-btn:hover { color: #ccc; border-color: #555; }
.chart-period-btn.active { color: var(--accent); border-color: rgba(90,240,196,0.5); background: rgba(90,240,196,0.06); }

#chart-symbol-selector {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.sym-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 0.52rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  transition: all 0.15s;
}
.sym-btn:hover { color: #bbb; border-color: #555; }
.sym-btn.active { color: var(--accent); border-color: rgba(90,240,196,0.5); background: rgba(90,240,196,0.06); }

#chart-wrap {
  height: 180px;
  position: relative;
}
#chart-canvas {
  position: absolute;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
}

/* ── News panel (bottom left) ── */
#news-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
#news-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#news-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.04em;
}
#news-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
#news-list::-webkit-scrollbar { width: 3px; }
#news-list::-webkit-scrollbar-thumb { background: var(--border2); }

.news-item {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.news-item:hover { background: rgba(255,255,255,0.03); }
.news-meta {
  display: flex;
  align-items: center;
  gap: 6px;
}
.news-domain {
  font-size: 0.52rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 4px;
}
.news-favicon {
  width: 12px;
  height: 12px;
  border-radius: 2px;
  object-fit: cover;
}
.news-age {
  font-size: 0.5rem;
  color: #333;
  letter-spacing: 0.06em;
  margin-left: auto;
}
.news-headline {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}
.news-summary {
  font-size: 0.6rem;
  color: var(--muted);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── AI Overview (top right, full width) ── */
#overview-panel {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
#overview-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.58rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
#overview-text {
  font-size: 0.72rem;
  color: var(--text);
  line-height: 1.7;
  opacity: 0.9;
}
#overview-age {
  font-size: 0.52rem;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.08em;
}

/* ── Module panels row ── */
#module-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.module-panel {
  padding: 16px 20px;
  border-right: 1px solid var(--border);
  position: relative;
}
.module-panel:last-child { border-right: none; }

.module-label {
  font-size: 0.52rem;
  color: var(--muted);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.module-age {
  position: absolute;
  top: 14px;
  right: 16px;
  font-size: 0.5rem;
  color: #333;
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Gauge widget */
.gauge-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
}
.gauge-svg-wrap { flex-shrink: 0; position: relative; width: 90px; height: 52px; }
.gauge-reading {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.04em;
  line-height: 1.1;
}
.gauge-reading.RISK-ON       { color: #50c840; }
.gauge-reading.NEUTRAL        { color: var(--muted); }
.gauge-reading.RISK-OFF       { color: #f05050; }
.gauge-reading["EXTREME FEAR"]{ color: #e74c3c; }
.gauge-reading.EUPHORIA        { color: #50c840; }
.gauge-reading.HAWKISH         { color: #f05050; }
.gauge-reading["SLIGHTLY HAWKISH"] { color: #f0a028; }
.gauge-reading["SLIGHTLY DOVISH"]  { color: #6060f0; }
.gauge-reading.DOVISH          { color: var(--blue); }
.gauge-desc {
  font-size: 0.62rem;
  color: var(--text);
  line-height: 1.55;
  opacity: 0.8;
  margin-top: 6px;
}

/* Policy word display */
.policy-word {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.2rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 8px;
}
.policy-word.NEUTRAL { color: var(--muted); }
.policy-word.HAWKISH { color: #f05050; }
.policy-word.DOVISH  { color: var(--blue); }

/* ── Bottom three modules ── */
#bottom-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  flex-shrink: 0;
}
.bottom-panel {
  padding: 16px 20px;
  border-right: 1px solid var(--border);
  border-top: 1px solid var(--border);
}
.bottom-panel:last-child { border-right: none; }

/* Slider indicator */
.slider-wrap { margin: 6px 0 8px; position: relative; }
.slider-track {
  height: 4px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--border2) 0%, var(--accent) 50%, #f05050 100%);
  position: relative;
}
.slider-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--accent);
  transition: left 0.4s ease;
}
.slider-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
  font-size: 0.48rem;
  color: var(--muted);
  letter-spacing: 0.06em;
}

/* Mini sparkline */
.bearing-sparkline {
  width: 100%;
  height: 60px;
  margin: 6px 0;
}

.bearing-label {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 0.06em;
  margin: 6px 0 4px;
}
.bearing-label.UP,
.bearing-label["STRONG UP"]   { color: var(--accent); }
.bearing-label.DOWN,
.bearing-label["STRONG DOWN"] { color: #f05050; }
.bearing-label.NEUTRAL         { color: var(--muted); }

.bullet-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-top: 6px;
}
.bullet-list li {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  line-height: 1.4;
  display: flex;
  gap: 5px;
}
.bullet-list li::before { content: '·'; color: var(--border2); }

/* Loading skeleton */
.skel {
  background: linear-gradient(90deg, var(--border) 0%, var(--border2) 50%, var(--border) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
  display: block;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Pulse/flow slider specific colors */
.track-flow   { background: linear-gradient(90deg, #3a3a50 0%, var(--accent) 50%, #f0a028 100%); }
.track-pulse  { background: linear-gradient(90deg, var(--border2) 0%, var(--accent) 35%, #f0a028 65%, #f05050 100%); }
.track-bear   { background: linear-gradient(90deg, var(--accent) 0%, var(--border2) 50%, #f05050 100%); }
</style>
</head>
<body>
<div id="app">

  <!-- Side Nav -->
  <nav id="side-nav">
    <div id="side-nav-logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <rect x="1" y="1" width="26" height="26" rx="6" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="6"  y="6"  width="7" height="7" rx="1.5" fill="var(--accent)" opacity="0.9"/>
        <rect x="15" y="6"  width="7" height="7" rx="1.5" fill="var(--accent)" opacity="0.4"/>
        <rect x="6"  y="15" width="7" height="7" rx="1.5" fill="var(--accent)" opacity="0.4"/>
        <rect x="15" y="15" width="7" height="7" rx="1.5" fill="var(--accent)" opacity="0.15"/>
      </svg>
      <span id="side-nav-logo-text">Inner Flows</span>
    </div>
    <div class="nav-divider"></div>
    <ul id="side-nav-links">
      <li><a href="/" class="nav-item" data-label="Dashboard">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></span>
        <span class="nav-label">Dashboard</span>
      </a></li>
      <li><a href="/macro" class="nav-item" data-label="Macro Desk">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span>
        <span class="nav-label">Macro Desk</span>
      </a></li>
      <li><a href="/calendar-page" class="nav-item" data-label="Calendar">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="nav-label">Calendar</span>
      </a></li>
    </ul>
    <div id="side-nav-bottom">
      <div class="nav-divider"></div>
      <a href="/bloomberg" target="_blank" class="nav-item nav-item--bottom" data-label="Bloomberg TV">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></span>
        <span class="nav-label">Bloomberg TV</span>
      </a>
    </div>
    <button id="nav-collapse-btn" aria-label="Toggle nav">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
  </nav>
  <div id="nav-tooltip"></div>

  <!-- Main content -->
  <div id="main-content">

    <!-- Header -->
    <div id="macro-header">
      <div>
        <div id="macro-title">Macro Desk</div>
        <div id="macro-sub">AI-powered market intelligence</div>
      </div>
      <button id="macro-refresh-btn" onclick="refreshAll()">
        <svg id="refresh-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh All
      </button>
    </div>

    <!-- Ticker strip -->
    <div id="ticker-strip"></div>

    <!-- Main content grid -->
    <div id="macro-grid">

      <!-- LEFT COLUMN -->
      <div id="macro-left">

        <!-- Chart panel -->
        <div id="chart-panel">
          <div id="chart-symbol-row">
            <div id="chart-symbol-name">SPX</div>
            <div id="chart-symbol-chg" class="flat">—</div>
            <button class="chart-period-btn active" data-p="1d" data-i="5m"  onclick="setPeriod(this)">1D</button>
            <button class="chart-period-btn"        data-p="5d" data-i="30m" onclick="setPeriod(this)">5D</button>
            <button class="chart-period-btn"        data-p="1mo" data-i="1d" onclick="setPeriod(this)">1M</button>
          </div>
          <div id="chart-symbol-selector">
            <!-- Populated dynamically from TICKER_KEYS -->
          </div>
          <div id="chart-wrap">
            <canvas id="chart-canvas"></canvas>
          </div>
        </div>

        <!-- News panel -->
        <div id="news-panel">
          <div id="news-header">
            <div id="news-title">News Stories</div>
            <div class="live-badge"><div class="ldot"></div> LIVE</div>
          </div>
          <div id="news-list">
            <div style="padding:24px 20px;font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;display:flex;gap:10px;align-items:center">
              <div class="cal-spinner"></div> Loading headlines…
            </div>
          </div>
        </div>

      </div><!-- /#macro-left -->

      <!-- RIGHT COLUMN -->
      <div id="macro-right">

        <!-- AI Overview -->
        <div id="overview-panel">
          <div id="overview-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
            AI overview
          </div>
          <div id="overview-text"><span class="skel" style="width:100%;height:14px;margin-bottom:6px"></span><span class="skel" style="width:85%;height:14px"></span></div>
          <div id="overview-age"></div>
        </div>

        <!-- Mood + Policy -->
        <div id="module-row">

          <div class="module-panel" id="mood-panel">
            <div class="module-label">Market Mood</div>
            <div class="module-age" id="mood-age"></div>
            <div class="gauge-wrap">
              <div class="gauge-svg-wrap">
                <svg id="mood-gauge" viewBox="0 0 90 52" width="90" height="52">
                  <!-- gauge arc background -->
                  <path d="M10 46 A36 36 0 0 1 80 46" fill="none" stroke="#1e1e28" stroke-width="8" stroke-linecap="round"/>
                  <!-- gauge arc filled -->
                  <path id="mood-arc" d="M10 46 A36 36 0 0 1 80 46" fill="none" stroke="#4a4a60" stroke-width="8" stroke-linecap="round" stroke-dasharray="113" stroke-dashoffset="113"/>
                  <!-- needle -->
                  <line id="mood-needle" x1="45" y1="46" x2="45" y2="14" stroke="#fff" stroke-width="1.5" stroke-linecap="round" style="transform-origin:45px 46px;transform:rotate(-90deg);transition:transform 0.6s ease"/>
                  <circle cx="45" cy="46" r="3" fill="#fff"/>
                </svg>
              </div>
              <div>
                <div class="gauge-reading" id="mood-label">—</div>
                <div class="gauge-desc" id="mood-desc"><span class="skel" style="width:160px;height:10px;display:block;margin-bottom:4px"></span><span class="skel" style="width:120px;height:10px;display:block"></span></div>
              </div>
            </div>
          </div>

          <div class="module-panel" id="policy-panel">
            <div class="module-label">Market Policy</div>
            <div class="module-age" id="policy-age"></div>
            <div class="policy-word" id="policy-label">—</div>
            <div class="gauge-desc" id="policy-desc"><span class="skel" style="width:160px;height:10px;display:block;margin-bottom:4px"></span><span class="skel" style="width:130px;height:10px;display:block"></span></div>
            <div style="margin-top:8px;font-size:0.58rem;color:var(--muted);line-height:1.5" id="policy-outlook"></div>
          </div>

        </div><!-- /#module-row -->

        <!-- Flow / Bearing / Pulse -->
        <div id="bottom-row">

          <div class="bottom-panel">
            <div class="module-label">Flow</div>
            <div class="module-age" id="flow-age"></div>
            <canvas id="flow-sparkline" class="bearing-sparkline"></canvas>
            <div class="bearing-label" id="flow-label">—</div>
            <div class="slider-wrap">
              <div class="slider-track track-flow">
                <div class="slider-thumb" id="flow-thumb" style="left:50%"></div>
              </div>
              <div class="slider-labels"><span>Thin</span><span>Healthy</span><span>Crowded</span></div>
            </div>
            <div style="font-size:0.6rem;color:var(--muted);line-height:1.5;margin-top:4px" id="flow-desc"></div>
          </div>

          <div class="bottom-panel">
            <div class="module-label">Bearing</div>
            <div class="module-age" id="bearing-age"></div>
            <canvas id="bearing-sparkline" class="bearing-sparkline"></canvas>
            <div class="bearing-label" id="bearing-label">—</div>
            <ul class="bullet-list" id="bearing-bullets"></ul>
          </div>

          <div class="bottom-panel">
            <div class="module-label">Pulse</div>
            <div class="module-age" id="pulse-age"></div>
            <canvas id="pulse-sparkline" class="bearing-sparkline"></canvas>
            <div class="bearing-label" id="pulse-label">—</div>
            <div class="slider-wrap">
              <div class="slider-track track-pulse">
                <div class="slider-thumb" id="pulse-thumb" style="left:20%"></div>
              </div>
              <div class="slider-labels"><span>Quiet</span><span>Tradeable</span><span>Wild</span></div>
            </div>
            <div style="font-size:0.6rem;color:var(--muted);line-height:1.5;margin-top:4px" id="pulse-desc"></div>
          </div>

        </div><!-- /#bottom-row -->

      </div><!-- /#macro-right -->

    </div><!-- /#macro-grid -->

  </div><!-- /#main-content -->
</div><!-- /#app -->

<script>
// Injected by Flask from config.PAIRS + macro extras
const INSTRUMENTS_FROM_CONFIG = {{ instruments_js | safe }};
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════
//  TICKER STRIP
// ════════════════════════════════════════════════════════════════
// Keys come from config.PAIRS + macro extras — injected by Flask
// Flask should pass: {{ instruments_js | safe }}
// Fallback to a hardcoded list if not injected
const TICKER_KEYS = (typeof INSTRUMENTS_FROM_CONFIG !== 'undefined')
  ? INSTRUMENTS_FROM_CONFIG
  : ['US30','US100','XAUUSD','EURUSD','EURGBP','USDJPY','GBPUSD','BTCUSD','VIX','DXY','US10Y','OIL'];

function renderTicker(data) {
  const strip = document.getElementById('ticker-strip');
  strip.innerHTML = '';
  TICKER_KEYS.forEach(k => {
    const d = data[k];
    if (!d || d.last == null) return;
    const chg   = d.change_p || 0;
    const cls   = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
    const sign  = chg >= 0 ? '+' : '';
    const item  = document.createElement('div');
    item.className = 'ticker-item' + (k === _chartSym ? ' active' : '');
    item.innerHTML = `
      <span class="ticker-name">${d.label}</span>
      <span class="ticker-price">${fmtPrice(d.last, k)}</span>
      <span class="ticker-chg ${cls}">${sign}${chg.toFixed(2)}%</span>`;
    item.onclick = () => {
      document.querySelectorAll('.sym-btn').forEach(b => b.classList.toggle('active', b.dataset.sym === k));
      document.querySelectorAll('.ticker-item').forEach(t => t.classList.remove('active'));
      item.classList.add('active');
      _chartSym = k;
      loadChart();
    };
    strip.appendChild(item);
  });
}

function fmtPrice(v, key) {
  if (v == null) return '—';
  if (['EURUSD','GBPUSD'].includes(key)) return v.toFixed(4);
  if (['US10Y','US2Y','VIX'].includes(key)) return v.toFixed(2);
  if (v > 100) return v.toFixed(2);
  return v.toFixed(3);
}

// ════════════════════════════════════════════════════════════════
//  CHART
// ════════════════════════════════════════════════════════════════
let _chartInst = null;
let _chartSym  = TICKER_KEYS[0] || 'US30';

// Build symbol selector buttons from config keys
function buildSymSelector() {
  const sel = document.getElementById('chart-symbol-selector');
  sel.innerHTML = '';
  TICKER_KEYS.forEach((k, i) => {
    const btn = document.createElement('button');
    btn.className = 'sym-btn' + (i === 0 ? ' active' : '');
    btn.dataset.sym = k;
    btn.textContent = k.replace('USD','').replace('=X','').replace('-USD','') || k;
    btn.onclick = () => setChartSym(btn);
    sel.appendChild(btn);
  });
}
let _chartPeriod = '1d';
let _chartInterval = '5m';

function setPeriod(btn) {
  document.querySelectorAll('.chart-period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _chartPeriod   = btn.dataset.p;
  _chartInterval = btn.dataset.i;
  loadChart();
}

function setChartSym(btn) {
  document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _chartSym = btn.dataset.sym;
  document.querySelectorAll('.ticker-item').forEach(ti => {
    ti.classList.toggle('active', ti.querySelector('.ticker-name')?.textContent?.trim() === document.querySelector(`[data-sym="${_chartSym}"]`)?.closest('.ticker-item')?.querySelector('.ticker-name')?.textContent?.trim());
  });
  loadChart();
}

async function loadChart() {
  try {
    const res  = await fetch(`/api/macro/chart/${_chartSym}?period=${_chartPeriod}&interval=${_chartInterval}`);
    const data = await res.json();
    if (!data.ok || !data.candles?.length) return;
    renderChart(data.candles, _chartSym);
  } catch(e) { console.error('chart error', e); }
}

function renderChart(candles, sym) {
  const snap = _lastSnap?.[sym];
  const chg  = snap?.change_p || 0;
  const color = chg >= 0 ? '#5af0c4' : '#f05a7e';

  document.getElementById('chart-symbol-name').textContent = sym;
  const chgEl = document.getElementById('chart-symbol-chg');
  chgEl.textContent = snap ? `${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%` : '—';
  chgEl.className   = `chart-symbol-chg ${chg >= 0 ? 'up' : 'down'}`;

  const labels = candles.map(c => {
    const d = new Date(c.time * 1000);
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
  });
  const prices = candles.map(c => c.close);

  const ctx = document.getElementById('chart-canvas').getContext('2d');
  if (_chartInst) { _chartInst.destroy(); _chartInst = null; }

  _chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: prices,
        borderColor: color,
        backgroundColor: color.replace(')', ',0.08)').replace('rgb', 'rgba'),
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(17,17,22,0.95)',
          borderColor: '#2a2a38', borderWidth: 1,
          titleColor: '#4a4a60', bodyColor: '#c8c8d8',
          titleFont: {family:'Space Mono', size:9},
          bodyFont: {family:'Space Mono', size:11},
          callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(4)}` }
        }
      },
      scales: {
        x: {
          grid: { color:'rgba(255,255,255,0.03)', drawTicks:false },
          border: { display:false },
          ticks: { color:'#4a4a60', font:{family:'Space Mono',size:8}, maxTicksLimit:6, maxRotation:0 }
        },
        y: {
          position: 'right',
          grid: { color:'rgba(255,255,255,0.03)', drawTicks:false },
          border: { display:false },
          ticks: { color:'#4a4a60', font:{family:'Space Mono',size:8}, maxTicksLimit:5 }
        }
      }
    }
  });
}

// Mini sparklines for bottom panels using synthetic data
function drawSparkline(canvasId, trend, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.offsetWidth || 200;
  const h = canvas.offsetHeight || 60;
  canvas.width  = w;
  canvas.height = h;
  ctx.clearRect(0, 0, w, h);

  // Generate synthetic noisy trend line
  const pts = 30;
  const data = [];
  let v = 0.5;
  for (let i = 0; i < pts; i++) {
    v += (Math.random() - 0.5) * 0.1 + trend * 0.02;
    v = Math.max(0.05, Math.min(0.95, v));
    data.push(v);
  }

  const xStep = w / (pts - 1);
  const grad  = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '33');
  grad.addColorStop(1, color + '00');

  ctx.beginPath();
  data.forEach((d, i) => { const x = i * xStep, y = h - d * h; i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
  ctx.strokeStyle = color;
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Fill
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
}

// ════════════════════════════════════════════════════════════════
//  MODULE RENDERERS
// ════════════════════════════════════════════════════════════════
function ageStr(m) {
  if (!m || m >= 999) return '';
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  return `${Math.floor(m/60)}h ago`;
}

function renderOverview(d) {
  document.getElementById('overview-text').textContent = d.text || '—';
  document.getElementById('overview-age').textContent  = d.age_min > 0 ? `Updated ${ageStr(d.age_min)}` : '';
}

function renderMood(d) {
  const label = d.label || 'NEUTRAL';
  const score = d.score || 0;

  // Gauge: score -1..+1 → needle rotation -90..+90
  const deg = score * 90;
  document.getElementById('mood-needle').style.transform = `rotate(${deg}deg)`;

  // Arc fill: map score to stroke-dashoffset
  const arc  = document.getElementById('mood-arc');
  const pct  = (score + 1) / 2;      // 0..1
  const total = 113;
  arc.style.strokeDashoffset = total - pct * total;

  // Color
  const colors = {'RISK-ON':'#50c840','NEUTRAL':'#4a4a60','RISK-OFF':'#f05050','EXTREME FEAR':'#e74c3c','EUPHORIA':'#50c840'};
  arc.style.stroke = colors[label] || '#4a4a60';

  document.getElementById('mood-label').textContent   = label;
  document.getElementById('mood-label').style.color   = colors[label] || 'var(--muted)';
  document.getElementById('mood-desc').textContent    = d.explanation || '';
  document.getElementById('mood-age').textContent     = ageStr(d.age_min);
}

function renderPolicy(d) {
  const label = d.label || 'NEUTRAL';
  const colors = {'HAWKISH':'#f05050','SLIGHTLY HAWKISH':'#f0a028','NEUTRAL':'var(--muted)','SLIGHTLY DOVISH':'#6060f0','DOVISH':'var(--blue)'};
  const el = document.getElementById('policy-label');
  el.textContent   = label;
  el.style.color   = colors[label] || 'var(--muted)';
  document.getElementById('policy-desc').textContent    = d.explanation || '';
  document.getElementById('policy-outlook').textContent = d.outlook ? `→ ${d.outlook}` : '';
  document.getElementById('policy-age').textContent     = ageStr(d.age_min);
}

function renderFlow(d) {
  const label = d.label || 'HEALTHY';
  const score = d.score || 0.5;
  const colors = {'THIN':'#4a4a60','HEALTHY':'var(--accent)','CROWDED':'#f0a028'};
  const el = document.getElementById('flow-label');
  el.textContent = label;
  el.style.color = colors[label] || 'var(--muted)';
  document.getElementById('flow-thumb').style.left = (score * 100) + '%';
  document.getElementById('flow-desc').textContent  = d.explanation || '';
  document.getElementById('flow-age').textContent   = ageStr(d.age_min);
  const trend = score > 0.5 ? 0.3 : -0.3;
  drawSparkline('flow-sparkline', trend, colors[label] || '#4a4a60');
}

function renderBearing(d) {
  const label = d.label || 'NEUTRAL';
  const colors = {'STRONG UP':'#5af0c4','UP':'#5af0c4','NEUTRAL':'#4a4a60','DOWN':'#f05050','STRONG DOWN':'#f05050'};
  const el = document.getElementById('bearing-label');
  el.textContent = label;
  el.style.color = colors[label] || 'var(--muted)';
  const ul = document.getElementById('bearing-bullets');
  ul.innerHTML = (d.bullets || []).map(b => `<li>${b}</li>`).join('');
  document.getElementById('bearing-age').textContent = ageStr(d.age_min);
  const trend = label.includes('UP') ? 1 : label.includes('DOWN') ? -1 : 0;
  drawSparkline('bearing-sparkline', trend, colors[label] || '#4a4a60');
}

function renderPulse(d) {
  const label = d.label || 'TRADEABLE';
  const score = d.score || 0.5;
  const colors = {'QUIET':'var(--muted)','TRADEABLE':'var(--accent)','WILD':'#f05050'};
  const el = document.getElementById('pulse-label');
  el.textContent = label;
  el.style.color = colors[label] || 'var(--muted)';
  document.getElementById('pulse-thumb').style.left = (score * 100) + '%';
  document.getElementById('pulse-desc').textContent  = d.explanation || '';
  document.getElementById('pulse-age').textContent   = ageStr(d.age_min);
  drawSparkline('pulse-sparkline', (score - 0.5) * 0.5, colors[label] || '#4a4a60');
}

// ════════════════════════════════════════════════════════════════
//  NEWS
// ════════════════════════════════════════════════════════════════
function renderNews(items) {
  const list = document.getElementById('news-list');
  if (!items?.length) {
    list.innerHTML = '<div style="padding:20px;font-size:0.6rem;color:var(--muted)">No headlines available</div>';
    return;
  }
  list.innerHTML = items.slice(0, 40).map(item => `
    <div class="news-item" onclick="window.open('${item.url}','_blank')">
      <div class="news-meta">
        <span class="news-domain">
          <img class="news-favicon" src="https://www.google.com/s2/favicons?sz=16&domain=${item.domain}" onerror="this.style.display='none'">
          ${item.domain}
        </span>
        <span class="news-age">${item.age_str || ''}</span>
      </div>
      <div class="news-headline">${item.title}</div>
      ${item.summary ? `<div class="news-summary">${item.summary}</div>` : ''}
    </div>
  `).join('');
}

// ════════════════════════════════════════════════════════════════
//  DATA LOADING
// ════════════════════════════════════════════════════════════════
let _lastSnap = null;

async function loadSnapshot() {
  try {
    const res  = await fetch('/api/macro/snapshot');
    const data = await res.json();
    if (data.ok) {
      _lastSnap = data.data;
      renderTicker(data.data);
    }
  } catch(e) { console.error('snapshot error', e); }
}

async function loadAllModules(force = false) {
  try {
    const url = '/api/macro/all' + (force ? '?refresh=1' : '');
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.ok) return;

    const m = data.modules || {};
    if (m.overview) renderOverview(m.overview);
    if (m.mood)     renderMood(m.mood);
    if (m.policy)   renderPolicy(m.policy);
    if (m.flow)     renderFlow(m.flow);
    if (m.bearing)  renderBearing(m.bearing);
    if (m.pulse)    renderPulse(m.pulse);

    if (data.market) { _lastSnap = data.market; renderTicker(data.market); }
  } catch(e) { console.error('modules error', e); }
}

async function loadNews() {
  try {
    const res  = await fetch('/api/macro/news?limit=40');
    const data = await res.json();
    if (data.ok) renderNews(data.items);
  } catch(e) { console.error('news error', e); }
}

async function refreshAll() {
  const btn = document.getElementById('macro-refresh-btn');
  const ico = document.getElementById('refresh-icon');
  btn.classList.add('loading');
  ico.classList.add('spin');
  await Promise.all([
    loadSnapshot(),
    loadAllModules(true),
    loadNews(),
  ]);
  loadChart();
  btn.classList.remove('loading');
  ico.classList.remove('spin');
}

// ════════════════════════════════════════════════════════════════
//  SIDE NAV
// ════════════════════════════════════════════════════════════════
{
  const nav = document.getElementById('side-nav');
  const tip = document.getElementById('nav-tooltip');
  const btn = document.getElementById('nav-collapse-btn');
  if (localStorage.getItem('nav-collapsed')==='1') nav.classList.add('collapsed');
  btn.addEventListener('click', () => {
    nav.classList.toggle('collapsed');
    localStorage.setItem('nav-collapsed', nav.classList.contains('collapsed')?'1':'0');
  });
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('mouseenter', e => {
      if (!nav.classList.contains('collapsed')) return;
      tip.textContent = item.dataset.label||'';
      tip.style.top = (e.currentTarget.getBoundingClientRect().top+6)+'px';
      tip.classList.add('visible');
    });
    item.addEventListener('mouseleave', () => tip.classList.remove('visible'));
  });
  const path = window.location.pathname.replace(/\/$/,'')||'/';
  document.querySelectorAll('.nav-item').forEach(item => {
    const href = (item.getAttribute('href')||'').replace(/\/$/,'')||'/';
    item.classList.toggle('active', href===path);
  });
}

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
(async () => {
  // Load fast data first
  buildSymSelector();
  await loadSnapshot();
  loadChart();
  // Then AI modules + news in parallel
  loadAllModules();
  loadNews();
})();

// Auto-refresh: snapshot every 5min, news every 3min, AI every 30min
setInterval(loadSnapshot, 5 * 60 * 1000);
setInterval(loadNews,     3 * 60 * 1000);
setInterval(loadAllModules, 30 * 60 * 1000);
</script>
