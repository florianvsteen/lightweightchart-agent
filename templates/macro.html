<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Desk — The Inner Flows</title>
<link rel="stylesheet" href="/static/dashboard.css">
<script>const INSTRUMENTS_FROM_CONFIG = {{ instruments_js | safe }};</script>
<style>
#main-content { overflow-y: auto; }

/* ── Header ── */
#macro-header {
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#macro-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 2.6rem;
  color: var(--accent); line-height: 1; margin-bottom: 6px;
}
#macro-sub { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.04em; }

/* ── Summary bar ── */
#summary-bar {
  display: flex; align-items: center; gap: 0;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  margin: 20px 32px;
  background: var(--surface);
  overflow: hidden;
  flex-shrink: 0;
}
.summary-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 24px;
  border-right: 1px solid var(--border2);
  flex: 1;
}
.summary-item:last-child { border-right: none; }
.summary-label { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em; white-space: nowrap; }
.summary-value {
  font-size: 0.75rem; font-weight: 700; padding: 2px 10px;
  border-radius: 20px; border: 1px solid; white-space: nowrap;
}
.summary-value.bullish  { color: var(--accent);  border-color: rgba(90,240,196,0.4); background: rgba(90,240,196,0.08); }
.summary-value.bearish  { color: var(--accent2); border-color: rgba(240,90,126,0.4); background: rgba(240,90,126,0.08); }
.summary-value.neutral  { color: var(--muted);   border-color: var(--border2); background: none; }
.summary-value.number   { color: var(--accent);  border-color: rgba(90,240,196,0.4); background: rgba(90,240,196,0.08); }
.summary-value.time     { color: var(--blue);    border-color: rgba(90,158,240,0.4); background: rgba(90,158,240,0.08); }

/* ── Pair cards grid ── */
#pairs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
  padding: 0 32px 32px;
}

/* ── Pair card ── */
.pair-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
  transition: border-color 0.2s, background 0.2s;
  position: relative; overflow: hidden;
}
.pair-card:hover { background: #13131a; border-color: var(--border2); }
.pair-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: var(--radius) 0 0 var(--radius);
}
.pair-card.bullish::before { background: var(--accent); }
.pair-card.bearish::before { background: var(--accent2); }
.pair-card.neutral::before { background: var(--muted); }

/* Card top row */
.pc-top { display: flex; align-items: center; gap: 10px; }
.pc-name {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 1.4rem; color: #fff; letter-spacing: 0.02em;
}
.pc-chg { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: var(--radius-sm); }
.pc-chg.up   { color: var(--accent);  background: rgba(90,240,196,0.1); }
.pc-chg.down { color: var(--accent2); background: rgba(240,90,126,0.1); }
.pc-chg.flat { color: var(--muted);   background: rgba(255,255,255,0.05); }
.pc-bias {
  font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 9px; border-radius: 20px; border: 1px solid; margin-left: auto;
}
.pc-bias.Bullish { color: var(--accent);  border-color: rgba(90,240,196,0.5); background: rgba(90,240,196,0.06); }
.pc-bias.Bearish { color: var(--accent2); border-color: rgba(240,90,126,0.5); background: rgba(240,90,126,0.06); }
.pc-bias.Neutral { color: var(--muted);   border-color: var(--border2); }

/* Confidence bar */
.pc-conf-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.pc-conf-label { font-size: 0.58rem; font-weight: 700; color: var(--text); }
.pc-conf-pct   { font-size: 0.58rem; font-weight: 700; color: var(--text); }
.pc-conf-track {
  height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden;
}
.pc-conf-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.5s ease;
}
.pc-updated { font-size: 0.52rem; color: var(--muted); letter-spacing: 0.06em; display: flex; align-items: center; gap: 5px; margin-top: 2px; }

/* AI box */
.pc-ai {
  background: rgba(90,240,196,0.03);
  border: 1px solid rgba(90,240,196,0.1);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.pc-ai-label {
  font-size: 0.52rem; font-weight: 700; color: var(--accent);
  letter-spacing: 0.14em; text-transform: uppercase;
  margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
}
.pc-ai-text { font-size: 0.68rem; color: var(--text); line-height: 1.65; opacity: 0.88; }
.pc-ai-more { font-size: 0.62rem; color: var(--accent); cursor: pointer; margin-top: 4px; display: inline-block; }
.pc-ai-more:hover { text-decoration: underline; }

/* Action buttons */
.pc-actions { display: flex; gap: 8px; }
.pc-btn {
  flex: 1; padding: 8px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-family: 'Space Mono', monospace;
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em;
  transition: all 0.15s; display: flex; align-items: center;
  justify-content: center; gap: 6px;
  border: 1px solid var(--border2); background: none; color: var(--muted);
}
.pc-btn:hover { border-color: #666; color: #ccc; }
.pc-btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
.pc-btn.primary:hover { background: #7ff8d8; }

/* News bullets */
.pc-news { display: flex; flex-direction: column; gap: 5px; padding-top: 4px; }
.pc-news-item {
  font-size: 0.6rem; color: var(--muted); line-height: 1.45;
  display: flex; gap: 7px;
}
.pc-news-item::before { content: '·'; color: rgba(90,240,196,0.5); flex-shrink: 0; margin-top: 1px; }

/* Quick overview expansion */
.pc-quick {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex; gap: 24px; flex-wrap: wrap;
}
.pc-quick-stat { display: flex; flex-direction: column; gap: 2px; }
.pc-quick-stat-label { font-size: 0.46rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
.pc-quick-stat-val   { font-size: 0.8rem; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }

/* Loading skeleton */
.skel { background: linear-gradient(90deg, var(--border) 0%, var(--border2) 50%, var(--border) 100%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; display: block; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>
<div id="app">

  <nav id="side-nav">
    <div id="side-nav-logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <rect x="1" y="1" width="26" height="26" rx="6" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="6"  y="6"  width="7" height="7" rx="1.5" fill="var(--accent)" opacity="0.9"/>
        <rect x="15" y="6"  width="7" height="7" rx="1.5" fill="var(--accent)" opacity="0.4"/>
        <rect x="6"  y="15" width="7" height="7" rx="1.5" fill="var(--accent)" opacity="0.4"/>
        <rect x="15" y="15" width="7" height="7" rx="1.5" fill="var(--accent)" opacity="0.15"/>
      </svg>
      <span id="side-nav-logo-text">Inner Flows</span>
    </div>
    <div class="nav-divider"></div>
    <ul id="side-nav-links">
      <li><a href="/" class="nav-item" data-label="Dashboard">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></span>
        <span class="nav-label">Dashboard</span>
      </a></li>
      <li><a href="/macro" class="nav-item" data-label="Macro Desk">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span>
        <span class="nav-label">Macro Desk</span>
      </a></li>
      <li><a href="/calendar-page" class="nav-item" data-label="Calendar">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="nav-label">Calendar</span>
      </a></li>
    </ul>
    <div id="side-nav-bottom">
      <div class="nav-divider"></div>
      <a href="/bloomberg" target="_blank" class="nav-item nav-item--bottom" data-label="Bloomberg TV">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></span>
        <span class="nav-label">Bloomberg TV</span>
      </a>
    </div>
    <button id="nav-collapse-btn" aria-label="Toggle nav">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
  </nav>
  <div id="nav-tooltip"></div>

  <div id="main-content">
    <div id="macro-header">
      <div id="macro-title">AI Market Bias Dashboard</div>
      <div id="macro-sub">Where deep institutional analysis meets AI-driven clarity</div>
    </div>

    <div id="summary-bar">
      <div class="summary-item">
        <span class="summary-label">Overall market sentiment:</span>
        <span class="summary-value neutral" id="summary-sentiment">Loading…</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Confidence index:</span>
        <span class="summary-value number" id="summary-confidence">—</span>
      </div>
      <div class="summary-item" style="flex:0;white-space:nowrap">
        <span class="summary-label">Page update:</span>
        <span class="summary-value time" id="summary-updated">—</span>
      </div>
    </div>

    <div id="pairs-grid">
      <div style="grid-column:1/-1;padding:20px;font-size:0.6rem;color:var(--muted);display:flex;gap:8px;align-items:center">
        <div class="cal-spinner"></div> Loading pair analysis…
      </div>
    </div>
  </div>
</div>

<script>
const MACRO_EXTRAS = new Set(['VIX','DXY','US10Y','OIL']);
const CONFIG_PAIRS = INSTRUMENTS_FROM_CONFIG.filter(k => !MACRO_EXTRAS.has(k));

let _snap      = {};
let _analyses  = {};
let _updateTs  = null;

function fmtPrice(v, k) {
  if (v == null) return '—';
  if (['EURUSD','GBPUSD','EURGBP','AUDUSD','USDCAD','USDCHF','NZDUSD'].includes(k)) return v.toFixed(4);
  if (['USDJPY','EURJPY','GBPJPY','AUDJPY','CADJPY'].includes(k)) return v.toFixed(3);
  if (v > 1000) return v.toFixed(2);
  return v.toFixed(2);
}

function timeAgo(ts) {
  if (!ts) return '—';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

function updateSummaryBar() {
  const sentiments = Object.values(_analyses).map(a => a.sentiment||'Neutral');
  const bullCount  = sentiments.filter(s => s === 'Bullish').length;
  const bearCount  = sentiments.filter(s => s === 'Bearish').length;
  const total      = sentiments.length || 1;

  let overall, cls;
  if (bullCount / total > 0.6)      { overall = 'Moderately bullish'; cls = 'bullish'; }
  else if (bearCount / total > 0.6) { overall = 'Moderately bearish'; cls = 'bearish'; }
  else                               { overall = 'Mixed / Neutral';    cls = 'neutral'; }

  const confidences = Object.values(_analyses).map(a => a.confidence||70);
  const avgConf     = Math.round(confidences.reduce((a,b)=>a+b,0) / (confidences.length||1));

  document.getElementById('summary-sentiment').textContent  = overall;
  document.getElementById('summary-sentiment').className    = `summary-value ${cls}`;
  document.getElementById('summary-confidence').textContent = `${avgConf}%`;
  document.getElementById('summary-updated').textContent    = _updateTs ? timeAgo(_updateTs) : '—';
}

function renderCards() {
  const grid = document.getElementById('pairs-grid');
  if (!CONFIG_PAIRS.length) { grid.innerHTML = '<div style="font-size:0.6rem;color:var(--muted)">No pairs in config.</div>'; return; }

  grid.innerHTML = '';
  CONFIG_PAIRS.forEach(k => {
    const d    = _snap[k] || {};
    const anal = _analyses[k] || {};
    const chg  = d.change_p || 0;
    const chgCls = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
    const sign   = chg >= 0 ? '+' : '';
    const sent   = anal.sentiment || 'Neutral';
    const sentC  = sent.charAt(0).toUpperCase() + sent.slice(1).toLowerCase();
    const conf   = anal.confidence || 0;

    const card = document.createElement('div');
    card.className = `pair-card ${sent.toLowerCase()}`;
    card.innerHTML = `
      <div class="pc-top">
        <div class="pc-name">${k}</div>
        <span class="pc-chg ${chgCls}">${sign}${Math.abs(chg).toFixed(2)}%</span>
        <span class="pc-bias ${sentC}">${sentC}</span>
      </div>

      <div>
        <div class="pc-conf-row">
          <span class="pc-conf-label">Confidence</span>
          <span class="pc-conf-pct">${conf}%</span>
        </div>
        <div class="pc-conf-track">
          <div class="pc-conf-fill" style="width:${conf}%"></div>
        </div>
        <div class="pc-updated">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Last update: ${_updateTs ? timeAgo(_updateTs) : '—'}
        </div>
      </div>

      ${anal.text ? `
      <div class="pc-ai">
        <div class="pc-ai-label">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
          AI Analysis
        </div>
        <div class="pc-ai-text">${anal.text.length > 220 ? anal.text.slice(0,220) + '…' : anal.text}</div>
        ${anal.text.length > 220 ? `<span class="pc-ai-more" onclick="event.stopPropagation();this.previousElementSibling.textContent='${anal.text.replace(/'/g,"\\'")}';this.remove()">Read more</span>` : ''}
      </div>` : `<div style="font-size:0.58rem;color:var(--muted);font-style:italic">Analysis loading…</div>`}

      <div class="pc-actions">
        <button class="pc-btn" onclick="event.stopPropagation();toggleQuick('${k}',this)">Quick Overview ∨</button>
        <button class="pc-btn primary" onclick="window.location.href='/macro/${k}'">Deep Dive ↗</button>
      </div>

      ${anal.news?.length ? `
      <div class="pc-news">
        ${anal.news.slice(0,3).map(n=>`<div class="pc-news-item">${n.headline}</div>`).join('')}
      </div>` : ''}
    `;
    grid.appendChild(card);
  });

  updateSummaryBar();
}

function toggleQuick(k, btn) {
  const card = btn.closest('.pair-card');
  const existing = card.querySelector('.pc-quick');
  if (existing) { existing.remove(); btn.textContent = 'Quick Overview ∨'; return; }

  const d = _snap[k] || {};
  const el = document.createElement('div');
  el.className = 'pc-quick';
  el.innerHTML = `
    ${d.last!=null?`<div class="pc-quick-stat"><div class="pc-quick-stat-label">Price</div><div class="pc-quick-stat-val">${fmtPrice(d.last,k)}</div></div>`:''}
    ${d.prev!=null?`<div class="pc-quick-stat"><div class="pc-quick-stat-label">Prev Close</div><div class="pc-quick-stat-val">${fmtPrice(d.prev,k)}</div></div>`:''}
    ${d.change!=null?`<div class="pc-quick-stat"><div class="pc-quick-stat-label">Change</div><div class="pc-quick-stat-val" style="color:${(d.change_p||0)>=0?'var(--accent)':'var(--accent2)'}">${(d.change_p||0)>=0?'+':''}${(d.change_p||0).toFixed(2)}%</div></div>`:''}
  `;
  btn.closest('.pc-actions').after(el);
  btn.textContent = 'Quick Overview ∧';
}

async function loadSnapshot() {
  try {
    const r = await fetch('/api/macro/snapshot');
    const d = await r.json();
    if (d.ok) { _snap = d.data; renderCards(); }
  } catch(e) {}
}

async function loadPairAnalyses() {
  await Promise.all(CONFIG_PAIRS.map(async k => {
    try {
      const r = await fetch(`/api/macro/pair/${k}`);
      const d = await r.json();
      if (d.ok) {
        _analyses[k] = d.data;
        _updateTs = Date.now();
        renderCards();
      }
    } catch(e) {}
  }));
}

// Side nav
{ const nav=document.getElementById('side-nav'),tip=document.getElementById('nav-tooltip'),btn=document.getElementById('nav-collapse-btn');
  if(localStorage.getItem('nav-collapsed')==='1') nav.classList.add('collapsed');
  btn.addEventListener('click',()=>{ nav.classList.toggle('collapsed'); localStorage.setItem('nav-collapsed',nav.classList.contains('collapsed')?'1':'0'); });
  document.querySelectorAll('.nav-item').forEach(i=>{ i.addEventListener('mouseenter',e=>{ if(!nav.classList.contains('collapsed')) return; tip.textContent=i.dataset.label||''; tip.style.top=(e.currentTarget.getBoundingClientRect().top+6)+'px'; tip.classList.add('visible'); }); i.addEventListener('mouseleave',()=>tip.classList.remove('visible')); });
  const path=window.location.pathname.replace(/\/$/,'')||'/';
  document.querySelectorAll('.nav-item').forEach(i=>{ const h=(i.getAttribute('href')||'').replace(/\/$/,'')||'/'; i.classList.toggle('active',h===path); }); }

// Update the "Xs ago" counter every second
setInterval(() => { document.getElementById('summary-updated').textContent = _updateTs ? timeAgo(_updateTs) : '—'; }, 1000);

(async () => {
  await loadSnapshot();
  loadPairAnalyses();
})();
setInterval(loadSnapshot,       5*60*1000);
setInterval(loadPairAnalyses,  30*60*1000);
</script>
</body>
</html>
