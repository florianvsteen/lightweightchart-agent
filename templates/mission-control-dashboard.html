<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080d09;
    --surface:   #0d1410;
    --border:    #162018;
    --border2:   #1e2e20;
    --text:      #c4d4c8;
    --muted:     #3e5442;
    --accent:    #00c896;
    --accent2:   #f05a7e;
    --blue:      #5a9ef0;
    --found:     #e8f0ea;
    --potential: #6a9a74;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(8,13,9,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo-sub {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding-left: 10px;
    border-left: 1px solid var(--border2);
    font-family: 'DM Mono', monospace;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }
  #clock {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
  }

  #session-global {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    padding: 3px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--muted);
    transition: all 0.3s;
    font-family: 'DM Mono', monospace;
  }
  #session-global.asian    { border-color: rgba(200,168,75,0.4); color: #c8a84b; background: rgba(200,168,75,0.06); }
  #session-global.london   { border-color: rgba(90,158,240,0.4); color: var(--blue); background: rgba(90,158,240,0.06); }
  #session-global.new_york { border-color: rgba(0,200,150,0.4); color: var(--accent); background: rgba(0,200,150,0.08); }
  #session-global.weekend  { border-color: rgba(60,40,40,0.6); color: #4a3030; }

  /* Weekend banner */
  #weekend-banner {
    display: none;
    background: linear-gradient(180deg, rgba(10, 8, 6, 0.98) 0%, rgba(8, 6, 4, 0.95) 100%);
    border-bottom: 1px solid rgba(60,30,10,0.5);
    padding: 22px 32px;
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  #weekend-banner .wk-inner { max-width: 600px; margin: 0 auto; text-align: center; }
  #weekend-banner .wk-icon { font-size: 1.4rem; margin-bottom: 6px; opacity: 0.5; }
  #weekend-banner .wk-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    color: #3a2808;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #weekend-banner .wk-countdown {
    font-family: 'DM Mono', monospace;
    font-size: 2rem;
    font-weight: 500;
    color: #2a1e08;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.1em;
    line-height: 1;
    margin-bottom: 6px;
  }
  #weekend-banner .wk-hint { font-size: 0.58rem; color: #1e1408; letter-spacing: 0.15em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
  #weekend-banner .wk-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(60,30,10,0.4) 30%, rgba(60,30,10,0.4) 70%, transparent);
    margin: 10px 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
  }

  .card {
    background: var(--surface);
    padding: 18px 20px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    display: block;
    color: var(--text);
  }
  .card:hover { background: #0f1912; }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,200,150,0.06), transparent);
    pointer-events: none;
  }

  /* Invisible full-card link overlay */
  .card-link-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  /* Chart link button — top right of card */
  .card-chart-link {
    position: absolute;
    top: 14px; right: 14px;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    color: var(--muted);
    background: var(--bg);
    text-decoration: none;
    transition: all 0.2s;
    z-index: 3;
    font-family: 'DM Mono', monospace;
  }
  .card-chart-link:hover { border-color: var(--accent); color: var(--accent); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .pair-name {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    color: #e8f4ec;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .pair-label {
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .detector-badge {
    font-size: 0.57rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--muted);
    background: var(--bg);
    font-family: 'DM Mono', monospace;
  }
  .detector-badge.accum { border-color: rgba(100,100,160,0.2); color: #7070a0; }
  .detector-badge.sd    { border-color: rgba(70,130,160,0.2); color: #5a9aaa; }

  .price-row { display: flex; align-items: baseline; gap: 8px; margin: 6px 0 10px; }
  .price {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    color: #e8f4ec;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .price-change {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 500;
  }
  .price-change.up   { color: var(--accent);  background: rgba(0,200,150,0.1); }
  .price-change.down { color: var(--accent2); background: rgba(240,90,126,0.08); }

  .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: all 0.4s; }
  .status-dot.found     { background: var(--found); box-shadow: 0 0 7px rgba(232,240,234,0.5); animation: pulse 2s ease-in-out infinite; }
  .status-dot.potential { background: var(--potential); }
  .status-dot.looking   { background: #1e3020; }
  .status-dot.offline   { background: #141e16; }
  .status-dot.standby   { background: #1e2014; }
  .status-dot.bullish   { background: var(--accent); box-shadow: 0 0 6px rgba(0,200,150,0.4); }
  .status-dot.bearish   { background: var(--accent2); box-shadow: 0 0 6px rgba(240,90,126,0.4); }
  .status-dot.misaligned{ background: var(--muted); }

  .weekend-card-badge {
    margin-top: 8px;
    padding: 4px 10px;
    font-size: 0.56rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3a2e1a;
    border: 1px solid #2a2010;
    border-radius: 4px;
    display: inline-block;
    font-family: 'DM Mono', monospace;
  }

  .status-text { font-size: 0.7rem; color: var(--text); letter-spacing: 0.02em; }
  .status-text.dim { color: var(--muted); }

  .accum-box {
    margin-top: 8px;
    padding: 8px 10px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    font-size: 0.63rem;
    color: var(--muted);
    display: none;
    line-height: 1.6;
    background: rgba(0,0,0,0.2);
  }
  .accum-box.found     { border-color: rgba(232,240,234,0.15); color: var(--text); display: block; }
  .accum-box.potential { border-color: rgba(106,154,116,0.25); color: var(--potential); display: block; }
  .accum-range {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #e8f4ec;
    font-weight: 500;
  }

  .zones-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .zone-pill {
    font-size: 0.57rem;
    letter-spacing: 0.07em;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }
  .zone-pill.demand     { border-color: rgba(90,158,240,0.35); color: #5a9ef0; background: rgba(90,158,240,0.06); }
  .zone-pill.supply     { border-color: rgba(240,90,126,0.35); color: #f05a7e; background: rgba(240,90,126,0.06); }
  .zone-pill.misaligned { border-color: rgba(200,160,40,0.35); color: #c8a020; background: rgba(200,160,40,0.05); }

  .bias-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .bias-pill {
    font-size: 0.58rem;
    letter-spacing: 0.07em;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .bias-pill.strong_bullish { border-color: rgba(0,200,150,0.5); color: var(--accent); background: rgba(0,200,150,0.08); font-weight: 600; }
  .bias-pill.bullish        { border-color: rgba(0,200,150,0.3); color: #40b888; background: rgba(0,200,150,0.05); }
  .bias-pill.bearish        { border-color: rgba(240,90,126,0.3); color: var(--accent2); background: rgba(240,90,126,0.05); }
  .bias-pill.strong_bearish { border-color: rgba(240,90,126,0.5); color: var(--accent2); background: rgba(240,90,126,0.08); font-weight: 600; }
  .bias-pill.misaligned     { border-color: var(--border2); color: var(--muted); }

  .card-divider { height: 1px; background: var(--border); margin: 10px 0; }
  .card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    font-family: 'DM Mono', monospace;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  footer {
    border-top: 1px solid var(--border);
    padding: 10px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
  }
  .refresh-indicator { display: flex; align-items: center; gap: 6px; }
  .refresh-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); transition: background 0.2s; }
  .refresh-dot.active { background: var(--accent); box-shadow: 0 0 5px rgba(0,200,150,0.4); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-title">Mission Control</span>
    <span class="logo-sub">Trading Agent</span>
  </div>
  <div class="header-right">
    <span id="session-global">--</span>
    <span id="clock">--:--:--</span>
  </div>
</header>

<div id="weekend-banner">
  <div class="wk-inner">
    <div class="wk-icon">⏸</div>
    <div class="wk-title">All Operations Suspended — Weekend Halt</div>
    <div class="wk-divider"></div>
    <div class="wk-countdown" id="weekend-countdown">--:--:--</div>
    <div class="wk-hint">Resumes Sunday 22:00 UTC &nbsp;·&nbsp; Fri 23:00 → Sun 22:00 UTC</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<footer>
  <span id="last-update">Waiting for data...</span>
  <div class="refresh-indicator">
    <div class="refresh-dot" id="refresh-dot"></div>
    <span id="refresh-label">LIVE · 5s</span>
  </div>
</footer>

<script>
const PAIRS = {{ pairs_js | safe }};

const SESSION_WINDOWS = [
  { name: 'asian',    label: 'Asian Session',    start: 1,  end: 7  },
  { name: 'london',   label: 'London Session',   start: 8,  end: 12 },
  { name: 'new_york', label: 'New York Session', start: 13, end: 19 },
];

function getCurrentSession() {
  const now = new Date();
  const dow  = now.getUTCDay();
  const hour = now.getUTCHours();
  if ((dow === 5 && hour >= 23) || dow === 6 || (dow === 0 && hour < 1)) return null;
  return SESSION_WINDOWS.find(s => hour >= s.start && hour < s.end) || null;
}

function isWeekendHalt() {
  const now = new Date();
  const dow  = now.getUTCDay();
  const hour = now.getUTCHours();
  if (dow === 5 && hour >= 23) return true;
  if (dow === 6) return true;
  if (dow === 0 && hour < 22) return true;
  return false;
}

function getWeekendCountdown() {
  const now = new Date();
  const target = new Date(now);
  const dow = now.getUTCDay();
  let daysUntilSun = (0 - dow + 7) % 7;
  if (daysUntilSun === 0 && now.getUTCHours() >= 22) daysUntilSun = 7;
  target.setUTCDate(target.getUTCDate() + daysUntilSun);
  target.setUTCHours(22, 0, 0, 0);
  const diff = target - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function formatPrice(p, id) {
  if (p == null) return '---';
  const forex5 = ['EURUSD','EURGBP','GBPUSD','AUDUSD','USDCAD','USDCHF','NZDUSD'];
  const forex3 = ['USDJPY','EURJPY','GBPJPY','AUDJPY','CADJPY'];
  if (forex5.includes(id)) return p.toFixed(5);
  if (forex3.includes(id)) return p.toFixed(3);
  if (id === 'XAUUSD') return p.toFixed(2);
  return p.toFixed(0);
}

function formatUTC(ts) {
  return new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

function biasLabelText(bias) {
  switch(bias) {
    case 'strong_bullish': return '⬆⬆ Strong Bullish';
    case 'bullish':        return '↑ Bullish';
    case 'bearish':        return '↓ Bearish';
    case 'strong_bearish': return '⬇⬇ Strong Bearish';
    default:               return '⚡ Misaligned';
  }
}

function renderBiasRow(biasInfo) {
  if (!biasInfo) return '';
  const bias  = biasInfo.bias || 'misaligned';
  const warn  = bias === 'misaligned'
    ? ' <span style="font-size:9px;color:#c8a84b;margin-left:4px">lower confidence</span>'
    : '';
  return `<div class="bias-row"><span class="bias-pill ${bias}">${biasLabelText(bias)}</span>${warn}</div>`;
}

function buildGrid() {
  const grid = document.getElementById('grid');
  PAIRS.forEach(pair => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${pair.id}`;
    card.innerHTML = `
      <a class="card-link-overlay" href="/chart-view/${pair.id}"></a>
      <div class="card-header">
        <div>
          <div class="pair-name">${pair.id}</div>
          <div class="pair-label">${pair.label}</div>
        </div>
        <span class="detector-badge ${pair.type === 'accumulation' ? 'accum' : 'sd'}">
          ${pair.type === 'accumulation' ? 'Accum' : 'S/D'}
        </span>
      </div>
      <div class="price-row">
        <span class="price" id="price-${pair.id}">---</span>
        <span class="price-change" id="change-${pair.id}"></span>
      </div>
      <div class="status-row">
        <div class="status-dot looking" id="dot-${pair.id}"></div>
        <span class="status-text dim" id="status-${pair.id}">Connecting...</span>
      </div>
      <div id="extra-${pair.id}"></div>
      <div class="card-divider"></div>
      <div class="card-meta">
        <span id="meta-${pair.id}">--</span>
      </div>`;
    grid.appendChild(card);
  });
}

async function fetchPair(pair) {
  try {
    const [res, biasRes] = await Promise.all([
      fetch(`/proxy/${pair.id}/api/data`),
      fetch(`/proxy/${pair.id}/api/bias`).catch(() => null),
    ]);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const biasInfo = biasRes && biasRes.ok ? await biasRes.json().catch(() => null) : null;

    const candles = data.candles || [];
    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2];
    const price = last?.close;

    const dotEl    = document.getElementById(`dot-${pair.id}`);
    const statusEl = document.getElementById(`status-${pair.id}`);
    const extraEl  = document.getElementById(`extra-${pair.id}`);
    const metaEl   = document.getElementById(`meta-${pair.id}`);

    if (!last) {
      dotEl.className      = 'status-dot standby';
      statusEl.textContent = pair.always_open ? 'No data — waiting for feed' : 'Markets closed';
      statusEl.className   = 'status-text dim';
      extraEl.innerHTML    = pair.always_open ? '' : '<div class="weekend-card-badge">OPERATIONS HALTED</div>';
      metaEl.textContent   = pair.always_open ? '⏳ WAITING' : '⛔ CLOSED';
      return;
    }

    document.getElementById(`price-${pair.id}`).textContent = formatPrice(price, pair.id);

    if (prev?.close && price) {
      const chg = ((price - prev.close) / prev.close) * 100;
      const el = document.getElementById(`change-${pair.id}`);
      el.textContent = (chg >= 0 ? '+' : '') + chg.toFixed(3) + '%';
      el.className = 'price-change ' + (chg >= 0 ? 'up' : 'down');
    }

    const det = data.detectors || {};

    // ── Accumulation ──────────────────────────────────────────────────
    if (pair.type === 'accumulation') {
      const z = det.accumulation;
      const biasHtml = renderBiasRow(biasInfo);

      if (!z || z.status === 'looking' || z.status === 'weekend' || z.status === 'out_of_session') {
        const isOOS = !z || z.status === 'weekend' || z.status === 'out_of_session';
        dotEl.className      = 'status-dot looking';
        statusEl.textContent = isOOS ? 'Out of session' : 'Looking for accumulation';
        statusEl.className   = 'status-text dim';
        extraEl.innerHTML    = biasHtml;
        metaEl.textContent   = z?.session ? z.session.replace('_',' ').toUpperCase() : '--';
      } else if (z.status === 'cooldown') {
        const remaining = Math.max(0, z.cooldown_until - Math.floor(Date.now() / 1000));
        const m = Math.floor(remaining / 60), s = remaining % 60;
        const pad = n => String(n).padStart(2, '0');
        dotEl.className      = 'status-dot potential';
        statusEl.textContent = `Cooldown — resumes in ${pad(m)}:${pad(s)}`;
        statusEl.className   = 'status-text dim';
        extraEl.innerHTML    = `<div class="accum-box potential">
          <span class="accum-range">${formatPrice(z.bottom, pair.id)} – ${formatPrice(z.top, pair.id)}</span>
          <br>Last breakout ${formatUTC(z.start)}
        </div>` + biasHtml;
        metaEl.textContent = '⏸ COOLDOWN';
      } else if ((z.status === 'found' || z.status === 'confirmed') && z.is_active) {
        dotEl.className      = 'status-dot found';
        statusEl.textContent = z.status === 'confirmed' ? 'Aggressor candle confirmed ✓' : 'Accumulation found';
        statusEl.className   = 'status-text';
        const adxStr = z.adx != null ? ` &nbsp;·&nbsp; ADX ${z.adx}` : '';
        extraEl.innerHTML    = `<div class="accum-box found">
          <span class="accum-range">${formatPrice(z.bottom, pair.id)} – ${formatPrice(z.top, pair.id)}</span>
          ${adxStr}<br>Since ${formatUTC(z.start)}
        </div>` + biasHtml;
        metaEl.textContent   = '';
      } else if (z.status === 'active' && z.is_active) {
        dotEl.className      = 'status-dot potential';
        statusEl.textContent = 'Accumulation forming';
        statusEl.className   = 'status-text';
        extraEl.innerHTML    = `<div class="accum-box potential">
          <span class="accum-range">${formatPrice(z.bottom, pair.id)} – ${formatPrice(z.top, pair.id)}</span>
          <br>Since ${formatUTC(z.start)}
        </div>` + biasHtml;
        metaEl.textContent = '● FORMING';
      } else {
        dotEl.className      = 'status-dot looking';
        statusEl.textContent = 'Looking for accumulation';
        statusEl.className   = 'status-text dim';
        extraEl.innerHTML    = biasHtml;
        metaEl.textContent   = '';
      }
    }

    // ── Supply & Demand ───────────────────────────────────────────────
    if (pair.type === 'supply_demand') {
      const result       = det.supply_demand;
      const bias         = result?.bias || biasInfo || {};
      const zones        = (result?.zones || []).filter(z => z.is_active);
      const isMisaligned = bias.bias === 'misaligned';
      const biasHtml     = renderBiasRow(bias);

      if      (bias.bias === 'strong_bullish' || bias.bias === 'bullish')  dotEl.className = 'status-dot bullish';
      else if (bias.bias === 'strong_bearish' || bias.bias === 'bearish')  dotEl.className = 'status-dot bearish';
      else                                                                   dotEl.className = 'status-dot misaligned';

      if (isMisaligned && zones.length > 0) {
        statusEl.textContent = `${zones.length} zone${zones.length > 1 ? 's' : ''} (bias misaligned ⚡)`;
        statusEl.className   = 'status-text';
      } else if (isMisaligned) {
        statusEl.textContent = 'Bias misaligned — scanning both directions';
        statusEl.className   = 'status-text dim';
      } else if (zones.length > 0) {
        statusEl.textContent = `${zones.length} zone${zones.length > 1 ? 's' : ''} active`;
        statusEl.className   = 'status-text';
      } else {
        statusEl.textContent = bias.bias?.includes('bullish') ? 'Seeking demand zones' : 'Seeking supply zones';
        statusEl.className   = 'status-text dim';
      }

      extraEl.innerHTML = biasHtml;
      metaEl.textContent = '';
    }

  } catch (e) {
    const dotEl    = document.getElementById(`dot-${pair.id}`);
    const statusEl = document.getElementById(`status-${pair.id}`);
    const extraEl  = document.getElementById(`extra-${pair.id}`);
    const metaEl   = document.getElementById(`meta-${pair.id}`);
    dotEl.className      = 'status-dot standby';
    statusEl.textContent = 'Markets closed — operations halted';
    statusEl.className   = 'status-text dim';
    extraEl.innerHTML    = '<div class="weekend-card-badge">OPERATIONS HALTED</div>';
    metaEl.textContent   = '⛔ CLOSED';
  }
}

function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

  const badge = document.getElementById('session-global');
  if (isWeekendHalt()) {
    const cd = getWeekendCountdown();
    badge.textContent = `⏸ CLOSED · Mon in ${cd}`;
    badge.className   = 'weekend';
    document.getElementById('weekend-banner').style.display = '';
    document.getElementById('weekend-countdown').textContent = cd;
    const lbl = document.getElementById('refresh-label');
    if (lbl) lbl.textContent = 'HALTED · weekend';
    return;
  }
  document.getElementById('weekend-banner').style.display = 'none';
  const lbl = document.getElementById('refresh-label');
  if (lbl) lbl.textContent = 'LIVE · 5s';

  const sess = getCurrentSession();
  if (sess) {
    badge.textContent = sess.label || sess.name;
    badge.className   = sess.name;
  } else {
    const utcH = now.getUTCHours();
    const next = SESSION_WINDOWS.find(s => s.start > utcH) || SESSION_WINDOWS[0];
    const target = new Date(now);
    target.setUTCHours(next.start, 0, 0, 0);
    if (target <= now) target.setUTCDate(target.getUTCDate() + 1);
    const diff = target - now;
    const dh = Math.floor(diff / 3600000);
    const dm = Math.floor((diff % 3600000) / 60000);
    const ds = Math.floor((diff % 60000) / 1000);
    const pad = n => String(n).padStart(2, '0');
    badge.textContent = `${next.label.split(' ')[0]} in ${pad(dh)}:${pad(dm)}:${pad(ds)}`;
    badge.className   = '';
  }
}

async function pollAll() {
  const weekend = isWeekendHalt();
  const dot = document.getElementById('refresh-dot');
  dot.classList.add('active');
  await Promise.all(PAIRS.map(pair => {
    if (weekend && !pair.always_open) return Promise.resolve();
    return fetchPair(pair);
  }));
  if (weekend) applyWeekendStandby();
  dot.classList.remove('active');
  const now = new Date();
  document.getElementById('last-update').textContent =
    'Last update: ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

function applyWeekendStandby() {
  PAIRS.forEach(pair => {
    if (pair.always_open) return;
    const dotEl    = document.getElementById(`dot-${pair.id}`);
    const statusEl = document.getElementById(`status-${pair.id}`);
    const extraEl  = document.getElementById(`extra-${pair.id}`);
    const metaEl   = document.getElementById(`meta-${pair.id}`);
    if (!dotEl) return;
    dotEl.className      = 'status-dot standby';
    statusEl.textContent = 'Standby — resumes Sunday 22:00 UTC';
    statusEl.className   = 'status-text dim';
    extraEl.innerHTML    = '<div class="weekend-card-badge">OPERATIONS SUSPENDED</div>';
    metaEl.textContent   = '⏸ HALTED';
  });
  document.getElementById('last-update').textContent = 'Polling suspended for weekend';
}

buildGrid();
setInterval(updateClock, 1000);
updateClock();
pollAll();
setInterval(pollAll, 5000);
</script>
